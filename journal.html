<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NarraTrade — Trade Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c14;--surface:#0d1420;--surface2:#111927;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --text:#e8edf5;--muted:#6b7a96;--muted2:#3d4d66;
  --accent:#00e5a0;--accent2:#0095ff;--accent3:#7b5ea7;
  --red:#ff4d6d;--gold:#f5c842;
  --font-d:'Syne',sans-serif;--font-m:'DM Mono',monospace;--font-s:'Instrument Serif',serif;
}
*{box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-d);-webkit-font-smoothing:antialiased;font-size:13px}

/* NAV */
.app-nav{
  position:sticky;top:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:62px;
  background:rgba(8,12,20,0.94);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);box-shadow:0 1px 24px rgba(0,0,0,0.5)
}
.nav-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;text-decoration:none;color:var(--text)}
.nav-logo span{color:var(--accent)}
.nav-tabs{display:flex;gap:4px;background:var(--surface);border-radius:10px;padding:4px;border:1px solid var(--border)}
.nav-tab{padding:8px 20px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:none;font-family:var(--font-d);text-decoration:none;display:inline-block;transition:all 0.2s}
.nav-tab.active{background:var(--accent);color:#000}
.nav-tab:hover:not(.active){color:var(--text);background:var(--surface2)}
.nav-right{display:flex;gap:10px;align-items:center}
.app-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px}
.nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}

/* LAYOUT */
.journal-layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 62px)}

/* SIDEBAR */
.journal-sidebar{
  background:var(--surface);border-right:1px solid var(--border);
  padding:20px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto
}
.journal-new-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--accent);color:#000;border-radius:10px;padding:12px;
  font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;
  border:none;font-family:var(--font-d);width:100%;margin-bottom:2px
}
.journal-new-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,229,160,0.25)}
.jfilter-row{display:flex;gap:5px;flex-wrap:wrap}
.jfilter{font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px;background:var(--surface2);color:var(--muted);cursor:pointer;border:1px solid var(--border);transition:all 0.15s;font-family:var(--font-m)}
.jfilter.active{background:rgba(0,229,160,0.1);color:var(--accent);border-color:rgba(0,229,160,0.3)}
.month-lbl{font-size:10px;color:var(--muted);font-family:var(--font-m);padding:2px 2px;margin:2px 0}

/* Entry cards */
.j-entry{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all 0.15s}
.j-entry:hover,.j-entry.active{border-color:var(--accent);background:rgba(0,229,160,0.04)}
.je-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.je-sym{font-size:13px;font-weight:800;font-family:var(--font-m)}
.je-date{font-size:10px;color:var(--muted);font-family:var(--font-m)}
.je-outcome{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-bottom:5px}
.je-outcome.win{background:rgba(0,229,160,0.12);color:var(--accent)}
.je-outcome.loss{background:rgba(255,77,109,0.12);color:var(--red)}
.je-outcome.open{background:rgba(0,149,255,0.12);color:var(--accent2)}
.je-snippet{font-size:11px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-family:var(--font-m)}

/* Month stats */
.j-month-stats{margin-top:auto;background:var(--surface2);border-radius:10px;padding:14px;border:1px solid var(--border)}
.stats-header{font-size:10px;color:var(--muted);font-family:var(--font-m);letter-spacing:1px;margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-val{font-size:17px;font-weight:800}
.stat-lbl{font-size:10px;color:var(--muted);font-family:var(--font-m)}

/* MAIN */
.journal-main{padding:32px 40px;overflow-y:auto;background:var(--bg)}

/* Empty */
.j-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;text-align:center;color:var(--muted)}
.j-empty-icon{font-size:48px;opacity:0.3}
.j-empty-title{font-size:26px;font-weight:800;font-family:var(--font-s);font-style:italic;color:var(--muted)}
.j-empty-sub{font-family:var(--font-m);font-size:10px;color:var(--muted2);max-width:360px;line-height:1.7;letter-spacing:0.3px}
.j-empty-cta{font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;padding:10px 24px;border-radius:20px;border:none;background:var(--accent);color:#000;font-weight:700;cursor:pointer;margin-top:8px;transition:all 0.2s}
.j-empty-cta:hover{box-shadow:0 6px 20px rgba(0,229,160,0.3);transform:translateY(-1px)}

/* Trade header */
.jm-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px}
.jm-badge{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px}
.jm-badge-item{padding:11px 18px;font-family:var(--font-m);font-size:12px}
.jm-badge-item+.jm-badge-item{border-left:1px solid var(--border)}
.jm-sym-big{font-size:18px;font-weight:800}
.jm-pnl.pos{color:var(--accent);font-weight:700}
.jm-pnl.neg{color:var(--red);font-weight:700}
.top-btns{display:flex;gap:8px;margin-top:4px}
.btn-edit{background:transparent;color:var(--text);padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);font-family:var(--font-d);transition:all 0.2s}
.btn-edit:hover{border-color:var(--border3)}
.btn-share{background:var(--accent);color:#000;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--font-d);transition:all 0.2s}
.btn-share:hover{box-shadow:0 6px 18px rgba(0,229,160,0.3);transform:translateY(-1px)}

/* Meta grid */
.jm-meta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.jm-meta-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.jm-meta-label{font-size:10px;color:var(--muted);font-family:var(--font-m);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
.jm-meta-val{font-size:18px;font-weight:800;font-family:var(--font-m)}

/* Chart card */
.jm-chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:22px}
.jm-chart-title{font-size:10px;font-weight:600;color:var(--muted);font-family:var(--font-m);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}

/* Tags */
.jm-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:22px}
.jm-tag{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:11px;font-family:var(--font-m);color:var(--muted)}

/* AI review */
.jm-ai{background:linear-gradient(135deg,rgba(123,94,167,0.1),rgba(0,149,255,0.08));border:1px solid rgba(123,94,167,0.25);border-radius:14px;padding:24px}
.jm-ai-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.jm-ai-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent3),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px}
.jm-ai-title{font-size:14px;font-weight:700}
.jm-ai-sub{font-size:10px;color:var(--muted);font-family:var(--font-m)}
.jm-ai-body{font-size:13px;line-height:1.65;color:var(--muted);font-family:var(--font-m)}
.jm-ai-body strong{color:var(--text)}
.jm-score-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}
.jm-score{background:rgba(0,0,0,0.2);border-radius:10px;padding:14px;text-align:center}
.jm-score-val{font-size:22px;font-weight:800;font-family:var(--font-m);margin-bottom:4px}
.jm-score-label{font-size:10px;color:var(--muted);font-family:var(--font-m)}

/* Bottom actions */
.jm-actions{display:flex;align-items:center;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn-delete{background:none;border:1px solid rgba(255,77,109,0.3);color:var(--red);padding:6px 16px;border-radius:20px;font-size:10px;font-family:var(--font-m);letter-spacing:1px;cursor:pointer;transition:all 0.2s}
.btn-delete:hover{background:rgba(255,77,109,0.08)}
.btn-export{background:none;border:1px solid var(--border2);color:var(--muted);padding:6px 16px;border-radius:20px;font-size:10px;font-family:var(--font-m);letter-spacing:1px;cursor:pointer;transition:all 0.2s;margin-left:auto}
.btn-export:hover{border-color:var(--border3);color:var(--text)}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}
</style>
</head>
<body>

<nav class="app-nav">
  <a class="nav-logo" href="index.html">NARRA<span>.</span>TRADE</a>
  <div class="nav-tabs">
    <a class="nav-tab" href="index.html">Overview</a>
    <a class="nav-tab" href="index.html">Signals</a>
    <a class="nav-tab" href="index.html">Live Feed</a>
    <span class="nav-tab active">Journal</span>
  </div>
  <div class="nav-right">
    <div class="app-badge">BETA</div>
    <div class="nav-avatar" id="navAvatar">M</div>
  </div>
</nav>

<div class="journal-layout">

  <!-- SIDEBAR -->
  <aside class="journal-sidebar">
    <button class="journal-new-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Entry
    </button>

    <div class="jfilter-row">
      <div class="jfilter active" onclick="setFilter('all',this)">All</div>
      <div class="jfilter" onclick="setFilter('call',this)">Calls</div>
      <div class="jfilter" onclick="setFilter('put',this)">Puts</div>
      <div class="jfilter" onclick="setFilter('open',this)">Open</div>
    </div>

    <div class="month-lbl" id="monthLbl"></div>
    <div id="entryList"></div>

    <div class="j-month-stats" id="monthStats" style="display:none">
      <div class="stats-header">STATS</div>
      <div class="stats-grid">
        <div><div class="stat-val" id="sTrades">0</div><div class="stat-lbl">Total Trades</div></div>
        <div><div class="stat-val" id="sCalls" style="color:var(--accent)">0</div><div class="stat-lbl">Calls</div></div>
        <div><div class="stat-val" id="sPuts" style="color:var(--red)">0</div><div class="stat-lbl">Puts</div></div>
        <div><div class="stat-val" id="sAvg" style="color:var(--gold)">—</div><div class="stat-lbl">Avg Contracts</div></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="journal-main" id="jMain">
    <div class="j-empty">
      <div class="j-empty-icon">📓</div>
      <div class="j-empty-title">No trades logged yet</div>
      <div class="j-empty-sub">Go to the Live Feed, find a trade play on any news card, tap the purple options line, fill in your details and hit Save to Journal.</div>
      <button class="j-empty-cta" onclick="window.location.href='index.html'">GO TO DASHBOARD →</button>
    </div>
  </main>

</div>

<script>
const SB_URL='https://bjbvtwqckknngaamuaam.supabase.co';
const SB_KEY='sb_publishable_f_j6gPsZNgBqVFWAt6wKRg_pgJkQx7P';
const sb=supabase.createClient(SB_URL,SB_KEY);

let trades=[],filtered=[],activeIdx=null,currentFilter='all';

// Auth guard
(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session?.user){window.location.href='onboarding.html';return;}
  const name=session.user.user_metadata?.full_name||session.user.email.split('@')[0];
  document.getElementById('navAvatar').textContent=name.charAt(0).toUpperCase();
  load();
})();

function load(){
  trades=JSON.parse(localStorage.getItem('narratrade-trades')||'[]');
  applyFilter();
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.jfilter').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
  activeIdx=null;
  applyFilter();
}

function applyFilter(){
  if(currentFilter==='call')filtered=trades.filter(t=>t.type==='CALL');
  else if(currentFilter==='put')filtered=trades.filter(t=>t.type==='PUT');
  else if(currentFilter==='open')filtered=trades.filter(t=>!t.closed);
  else filtered=[...trades];
  renderSidebar();
  if(filtered.length>0){
    if(activeIdx===null)activeIdx=0;
    if(activeIdx>=filtered.length)activeIdx=0;
    renderDetail(activeIdx);
  } else {
    showEmpty();
  }
}

function renderSidebar(){
  // Month label
  const ml=document.getElementById('monthLbl');
  if(filtered.length){
    const d=new Date(filtered[0].logged_at||Date.now());
    ml.textContent=d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    ml.style.display='block';
  } else {
    ml.textContent='No trades yet';
    ml.style.display='block';
  }

  // Entry list
  document.getElementById('entryList').innerHTML=filtered.map((t,i)=>{
    const dt=t.logged_at?new Date(t.logged_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
    const oc=t.closed?(t.pnl&&t.pnl>0?'win':'loss'):'open';
    const ol=oc==='win'?`▲ WIN · +$${t.pnl||0}`:oc==='loss'?`▼ LOSS · −$${Math.abs(t.pnl||0)}`:t.type==='EQUITY'?'● EQUITY':'● OPEN';
    const snip=t.note||`${t.type||'OPTION'} · ${t.expiry||''}`;
    return`<div class="j-entry${i===activeIdx?' active':''}" onclick="selectEntry(${i})">
      <div class="je-top"><div class="je-sym">${esc(t.ticker||'—')}</div><div class="je-date">${dt}</div></div>
      <div class="je-outcome ${oc}">${ol}</div>
      <div class="je-snippet">${esc(snip)}</div>
    </div>`;
  }).join('');

  // Stats
  const ms=document.getElementById('monthStats');
  if(filtered.length){
    ms.style.display='block';
    const calls=filtered.filter(t=>t.type==='CALL').length;
    const puts=filtered.filter(t=>t.type==='PUT').length;
    const totalQty=filtered.reduce((s,t)=>s+(parseInt(t.qty)||0),0);
    document.getElementById('sTrades').textContent=filtered.length;
    document.getElementById('sCalls').textContent=calls;
    document.getElementById('sPuts').textContent=puts;
    document.getElementById('sAvg').textContent=filtered.length?(totalQty/filtered.length).toFixed(1):'—';
  } else {
    ms.style.display='none';
  }
}

function selectEntry(i){
  activeIdx=i;
  renderSidebar();
  renderDetail(i);
}

function showEmpty(){
  document.getElementById('jMain').innerHTML=`<div class="j-empty">
    <div class="j-empty-icon">📓</div>
    <div class="j-empty-title">No trades logged yet</div>
    <div class="j-empty-sub">Go to the Live Feed, find a trade play on any news card, tap the purple options line, fill in your details and hit Save to Journal.</div>
    <button class="j-empty-cta" onclick="window.location.href='index.html'">GO TO DASHBOARD →</button>
  </div>`;
}

function renderDetail(i){
  const t=filtered[i];if(!t)return;
  const dt=t.logged_at?new Date(t.logged_at).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
  const isCall=t.type==='CALL';

  // Compute R:R
  let rrText='Add TP and SL to calculate R:R.';
  let rrScore='—';
  try{
    const entry=parseFloat((t.entry||'').replace(/[$,]/g,''));
    const tp=parseFloat((t.tp||'').replace(/[$,]/g,''));
    const sl=parseFloat((t.sl||'').replace(/[$,]/g,''));
    if(!isNaN(entry)&&!isNaN(tp)&&!isNaN(sl)&&Math.abs(entry-sl)>0){
      const rr=(Math.abs(tp-entry)/Math.abs(entry-sl)).toFixed(1);
      rrText=`R:R ratio is <strong style="color:var(--accent)">1 : ${rr}</strong> — ${parseFloat(rr)>=2?'solid setup above 1:2 threshold':'consider improving ratio to above 1:2'}.`;
      rrScore='1:'+rr;
    }
  }catch{}

  document.getElementById('jMain').innerHTML=`
    <div class="jm-top">
      <div>
        <div class="jm-badge">
          <div class="jm-badge-item"><span class="jm-sym-big">${esc(t.ticker||'—')}</span></div>
          <div class="jm-badge-item" style="color:var(--muted);font-size:11px">${esc(t.type||'OPTION')} · ${esc(t.qty||'—')} contracts · ${dt}</div>
          ${t.pnl!=null?`<div class="jm-badge-item"><span class="jm-pnl ${t.pnl>=0?'pos':'neg'}">${t.pnl>=0?'+':'−'}$${Math.abs(t.pnl||0).toFixed(0)} (${t.pnl>=0?'+':'−'}${Math.abs(((t.pnl||0)/100)*100).toFixed(1)}%)</span></div>`:''}
        </div>
      </div>
      <div class="top-btns">
        <button class="btn-edit" onclick="deleteEntry(${i})">Delete</button>
        <button class="btn-share">Share</button>
      </div>
    </div>

    <div class="jm-meta-grid">
      <div class="jm-meta-card">
        <div class="jm-meta-label">Entry Price</div>
        <div class="jm-meta-val">${esc(t.entry||'—')}</div>
      </div>
      <div class="jm-meta-card">
        <div class="jm-meta-label">Strike</div>
        <div class="jm-meta-val">${esc(t.strike||'—')}</div>
      </div>
      <div class="jm-meta-card">
        <div class="jm-meta-label">Stop Loss</div>
        <div class="jm-meta-val" style="color:var(--red)">${esc(t.sl||'—')}</div>
      </div>
      <div class="jm-meta-card">
        <div class="jm-meta-label">Take Profit</div>
        <div class="jm-meta-val" style="color:var(--accent)">${esc(t.tp||'—')}</div>
      </div>
    </div>

    <div class="jm-chart-card">
      <div class="jm-chart-title">Price Action · ${esc(t.ticker||'—')} · ${esc(t.expiry||'Contract')}</div>
      <svg width="100%" height="100" viewBox="0 0 620 100" preserveAspectRatio="none">
        <defs><linearGradient id="jg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#00e5a0" stop-opacity="0"/>
        </linearGradient></defs>
        <path d="M0,85 C60,77 120,70 180,67 C240,64 300,52 360,42 C420,32 480,24 540,18 C570,15 600,13 620,12 L620,100 L0,100 Z" fill="url(#jg)"/>
        <path d="M0,85 C60,77 120,70 180,67 C240,64 300,52 360,42 C420,32 480,24 540,18 C570,15 600,13 620,12" fill="none" stroke="#00e5a0" stroke-width="2"/>
        <line x1="148" y1="0" x2="148" y2="100" stroke="rgba(0,229,160,0.22)" stroke-width="1" stroke-dasharray="4 3"/>
        <circle cx="148" cy="66" r="3.5" fill="#00e5a0"/>
        <text x="151" y="14" fill="#00e5a0" font-size="9" font-family="DM Mono">ENTRY ${esc(t.entry||'—')}</text>
        <line x1="530" y1="0" x2="530" y2="100" stroke="rgba(0,229,160,0.45)" stroke-width="1" stroke-dasharray="4 3"/>
        <circle cx="530" cy="18" r="3.5" fill="#00e5a0"/>
        <text x="440" y="14" fill="#00e5a0" font-size="9" font-family="DM Mono">TP ${esc(t.tp||'—')}</text>
        <line x1="0" y1="93" x2="620" y2="93" stroke="rgba(255,77,109,0.18)" stroke-width="1" stroke-dasharray="3 3"/>
        <text x="3" y="99" fill="#ff4d6d" font-size="8" font-family="DM Mono">STOP ${esc(t.sl||'—')}</text>
      </svg>
    </div>

    <div class="jm-tags">
      <div class="jm-tag">${esc(isCall?'#call':'#put')}</div>
      <div class="jm-tag">#${esc((t.ticker||'ticker').toLowerCase())}</div>
      ${t.expiry?`<div class="jm-tag">#${esc(t.expiry.replace(/\//g,'-'))}</div>`:''}
      ${t.qty?`<div class="jm-tag">#${esc(t.qty)}-contracts</div>`:''}
      ${t.note?`<div class="jm-tag">#notes</div>`:''}
    </div>

    <div class="jm-ai">
      <div class="jm-ai-header">
        <div class="jm-ai-icon">✦</div>
        <div>
          <div class="jm-ai-title">NarraTrade AI Review</div>
          <div class="jm-ai-sub">Auto-generated · ${dt}</div>
        </div>
      </div>
      <div class="jm-ai-body">
        <strong>Trade logged:</strong> ${esc(t.ticker||'—')} ${esc(t.type||'')} ${esc(t.expiry||'')} at entry ${esc(t.entry||'—')}, targeting ${esc(t.tp||'—')} with stop at ${esc(t.sl||'—')}.<br><br>
        <strong>Risk/Reward:</strong> ${rrText}<br><br>
        <strong>Pattern:</strong> This ${isCall?'bullish CALL':'bearish PUT'} play was logged from a live news catalyst. ${t.note?`Your notes: <em style="color:var(--text)">${esc(t.note)}</em>`:' Add notes to track your trade thesis.'}
      </div>
      <div class="jm-score-row">
        <div class="jm-score">
          <div class="jm-score-val" style="color:var(--accent)">${t.entry?'✓':'—'}</div>
          <div class="jm-score-label">Entry</div>
        </div>
        <div class="jm-score">
          <div class="jm-score-val" style="color:var(--accent2)">${t.tp?'✓':'—'}</div>
          <div class="jm-score-label">Take Profit</div>
        </div>
        <div class="jm-score">
          <div class="jm-score-val" style="color:var(--accent)">${t.sl?'✓':'—'}</div>
          <div class="jm-score-label">Stop Loss</div>
        </div>
        <div class="jm-score">
          <div class="jm-score-val" style="color:var(--gold)">${rrScore}</div>
          <div class="jm-score-label">R:R Ratio</div>
        </div>
      </div>
    </div>

    <div class="jm-actions">
      <button class="btn-delete" onclick="deleteEntry(${i})">✕ DELETE TRADE</button>
      <button class="btn-export" onclick="exportCSV()">↓ EXPORT CSV</button>
    </div>
  `;
}

function deleteEntry(i){
  if(!confirm('Delete this trade? This cannot be undone.'))return;
  const real=filtered[i];
  const idx=trades.findIndex(t=>t===real||t.logged_at===real.logged_at);
  if(idx>-1)trades.splice(idx,1);
  localStorage.setItem('narratrade-trades',JSON.stringify(trades));
  activeIdx=null;
  applyFilter();
}

function exportCSV(){
  if(!trades.length){alert('No trades to export.');return;}
  const h=['Ticker','Expiry','Type','Strike','Entry','Contracts','TP','SL','Notes','Date'];
  const rows=trades.map(t=>[t.ticker,t.expiry,t.type,t.strike,t.entry,t.qty,t.tp,t.sl,t.note,t.logged_at].map(v=>'"'+(v||'').replace(/"/g,'""')+'"'));
  const csv=[h,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='narratrade-journal-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>

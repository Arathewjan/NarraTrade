<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NarraTrade — Trade Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
[data-theme="dark"]{--bg:#080a0d;--surface:#0d1017;--card:#0f1318;--border:#171e28;--border2:#1f2a38;--text:#e8edf5;--text2:#7a8fa8;--muted:#4a5568;--dim:#2a3a50;--gold:#c8a96e;--gold-dim:rgba(200,169,110,0.08);--gold-border:rgba(200,169,110,0.22);--bull:#0d9e52;--bull-light:rgba(13,158,82,0.1);--bull-mid:rgba(13,158,82,0.28);--bull-text:#34d07a;--bear:#dc1f3b;--bear-light:rgba(220,31,59,0.08);--bear-mid:rgba(220,31,59,0.28);--bear-text:#f05252;--hbg:rgba(8,10,13,0.97);--shadow:0 1px 16px rgba(0,0,0,0.5)}
[data-theme="light"]{--bg:#f4f6f9;--surface:#fff;--card:#fff;--border:#e2e8f0;--border2:#cbd5e1;--text:#0d1520;--text2:#475569;--muted:#94a3b8;--dim:#cbd5e1;--gold:#b07d2a;--gold-dim:rgba(176,125,42,0.08);--gold-border:rgba(176,125,42,0.25);--bull:#0d9e52;--bull-light:#e8faf1;--bull-mid:#b6ecd2;--bull-text:#076636;--bear:#dc1f3b;--bear-light:#fef0f2;--bear-mid:#fac5cc;--bear-text:#9b0e22;--hbg:rgba(255,255,255,0.97);--shadow:0 1px 16px rgba(0,0,0,0.08)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
header{position:sticky;top:0;z-index:200;background:var(--hbg);backdrop-filter:blur(16px);border-bottom:1px solid var(--border2);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:12px;cursor:pointer}
.logo-mark{width:34px;height:34px;background:linear-gradient(140deg,#c8961e,#b07d2a);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:#fff}
.logo-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.logo-title em{color:var(--gold);font-style:normal}
.hright{display:flex;align-items:center;gap:12px}
.nbtn{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--muted);padding:5px 12px;border-radius:20px;border:1px solid transparent;cursor:pointer;background:none;text-decoration:none;display:inline-block;transition:all .15s}
.nbtn:hover{color:var(--text2);border-color:var(--border2)}
.nbtn.on{color:var(--gold);border-color:var(--gold-border);background:var(--gold-dim)}
.ttoggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 6px 5px 11px;border-radius:22px;border:1.5px solid var(--border2);background:var(--surface);user-select:none}
.tlabel{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1.5px;color:var(--muted)}
.ttrack{width:34px;height:18px;background:var(--border2);border-radius:9px;position:relative;transition:background .3s;flex-shrink:0}
[data-theme="light"] .ttrack{background:var(--gold)}
.tthumb{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .3s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;font-size:8px}
[data-theme="light"] .tthumb{transform:translateX(16px)}
.ph{padding:32px 32px 0;display:flex;align-items:flex-end;justify-content:space-between}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.ptitle{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:700;color:var(--text);letter-spacing:-1px;line-height:1}
.ptitle em{color:var(--gold);font-style:italic}
.pactions{display:flex;align-items:center;gap:10px}
.abtn{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;padding:8px 16px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.abtn:hover{border-color:var(--gold-border);color:var(--gold)}
.srow{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;padding:28px 32px 0}
.sc{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:18px 20px}
.sl{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.sv{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;line-height:1;color:var(--text);margin-bottom:4px}
.ss{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted)}
.jtabs{display:flex;align-items:center;padding:24px 32px 0;border-bottom:1px solid var(--border)}
.jtab{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:0 18px;height:40px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.jtab:hover{color:var(--text2)}
.jtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.jwrap{padding:24px 32px}
table{width:100%;border-collapse:separate;border-spacing:0 8px}
thead th{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:0 16px 8px;text-align:left}
thead th:last-child{text-align:right}
.tr{background:var(--card);border-radius:10px;cursor:pointer;transition:all .2s}
.tr:hover{background:var(--surface)}
.tr td{padding:14px 16px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.tr td:first-child{border-left:3px solid #4a9eff;border-radius:10px 0 0 10px;padding-left:14px}
.tr td:last-child{border-right:1px solid var(--border);border-radius:0 10px 10px 0;text-align:right}
.tt{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
.tc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2)}
.td{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.tp{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text)}
.ts{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:1px}
.badge{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;padding:3px 9px;border-radius:20px}
.bopen{background:rgba(74,158,255,.1);color:#4a9eff;border:1px solid rgba(74,158,255,.25)}
.call{color:#34d07a;font-weight:600}
.put{color:#f05252;font-weight:600}
.dr{display:none}
.dr.on{display:table-row}
.dr td{padding:0 16px 16px;background:var(--card);border-bottom:1px solid var(--border);border-left:1px solid var(--border);border-right:1px solid var(--border);border-radius:0 0 10px 10px}
.dg{background:rgba(0,0,0,.2);border-radius:8px;padding:14px 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.df{display:flex;flex-direction:column;gap:4px}
.dl{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.dv{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2)}
.dfull{grid-column:1/-1}
.dact{grid-column:1/-1;display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--border);margin-top:4px}
.delbtn{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;padding:5px 14px;border-radius:20px;cursor:pointer;background:none;color:var(--muted);border:1px solid var(--border2);margin-left:auto;transition:all .15s}
.delbtn:hover{border-color:var(--bear-mid);color:var(--bear-text)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;color:var(--muted);gap:16px;text-align:center}
.ei{font-size:40px;opacity:.3}
.et{font-family:'Cormorant Garamond',serif;font-size:26px}
.es{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--dim);max-width:360px;line-height:1.7}
.ecta{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;padding:10px 24px;border-radius:20px;border:none;background:linear-gradient(135deg,#c8961e,#b07d2a);color:#fff;cursor:pointer;margin-top:8px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="window.location.href='index.html'">
    <div class="logo-mark">N</div>
    <div class="logo-title">Narra<em>Trade</em></div>
  </div>
  <div class="hright">
    <a class="nbtn" href="index.html">DASHBOARD</a>
    <span class="nbtn on">JOURNAL</span>
    <span id="userLabel" style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted)"></span>
    <div class="ttoggle" onclick="toggleTheme()">
      <span class="tlabel" id="tlabel">DARK</span>
      <div class="ttrack"><div class="tthumb"><span id="ticon">☾</span></div></div>
    </div>
  </div>
</header>

<div class="ph">
  <div><div class="eyebrow">Trade Journal</div><div class="ptitle">My <em>Trades</em></div></div>
  <div class="pactions">
    <button class="abtn" onclick="exportCSV()">↓ EXPORT CSV</button>
    <button class="abtn" onclick="clearAll()">✕ CLEAR ALL</button>
  </div>
</div>

<div class="srow">
  <div class="sc"><div class="sl">Total Trades</div><div class="sv" id="s1">0</div><div class="ss">Logged trades</div></div>
  <div class="sc"><div class="sl">Calls</div><div class="sv" style="color:var(--bull-text)" id="s2">0</div><div class="ss">Bullish contracts</div></div>
  <div class="sc"><div class="sl">Puts</div><div class="sv" style="color:var(--bear-text)" id="s3">0</div><div class="ss">Bearish contracts</div></div>
  <div class="sc"><div class="sl">Avg Contracts</div><div class="sv" style="color:var(--gold)" id="s4">—</div><div class="ss">Per trade</div></div>
  <div class="sc"><div class="sl">Open Positions</div><div class="sv" style="color:#4a9eff" id="s5">0</div><div class="ss">Active trades</div></div>
</div>

<div class="jtabs">
  <button class="jtab on" onclick="setTab('all',this)">All Trades</button>
  <button class="jtab" onclick="setTab('call',this)">Calls</button>
  <button class="jtab" onclick="setTab('put',this)">Puts</button>
  <button class="jtab" onclick="setTab('open',this)">Open</button>
</div>

<div class="jwrap">
  <table>
    <thead><tr>
      <th>Ticker / Contract</th><th>Date Logged</th><th>Entry</th>
      <th>Strike</th><th>TP / SL</th><th>Qty</th><th>Status</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty"></div>
</div>

<script>
const SB_URL='https://bjbvtwqckknngaamuaam.supabase.co';
const SB_KEY='sb_publishable_f_j6gPsZNgBqVFWAt6wKRg_pgJkQx7P';
const sb=supabase.createClient(SB_URL,SB_KEY);
let trades=[],tab='all';

// Auth guard
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session?.user){window.location.href='onboarding.html';return;}
  const name=session.user.user_metadata?.full_name||session.user.email.split('@')[0];
  document.getElementById('userLabel').textContent=name.toUpperCase();
  load();
})();

// Theme
function toggleTheme(){
  const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('tlabel').textContent=t==='light'?'LIGHT':'DARK';
  document.getElementById('ticon').textContent=t==='light'?'☀':'☾';
  localStorage.setItem('nt-theme',t);
}
(()=>{const s=localStorage.getItem('nt-theme');if(s&&s!=='dark'){document.documentElement.setAttribute('data-theme',s);document.getElementById('tlabel').textContent='LIGHT';document.getElementById('ticon').textContent='☀';}})();

function load(){
  trades=JSON.parse(localStorage.getItem('narratrade-trades')||'[]');
  stats();render();
}

function stats(){
  const calls=trades.filter(t=>t.type==='CALL').length;
  const puts=trades.filter(t=>t.type==='PUT').length;
  const total=trades.reduce((s,t)=>s+(parseInt(t.qty)||0),0);
  document.getElementById('s1').textContent=trades.length;
  document.getElementById('s2').textContent=calls;
  document.getElementById('s3').textContent=puts;
  document.getElementById('s4').textContent=trades.length?(total/trades.length).toFixed(1):'—';
  document.getElementById('s5').textContent=trades.length;
}

function setTab(t,btn){
  tab=t;
  document.querySelectorAll('.jtab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function render(){
  let list=trades;
  if(tab==='call')list=trades.filter(t=>t.type==='CALL');
  if(tab==='put')list=trades.filter(t=>t.type==='PUT');
  if(tab==='open')list=trades.filter(t=>!t.closed);
  const tb=document.getElementById('tbody');
  const em=document.getElementById('empty');
  if(!list.length){
    tb.innerHTML='';
    em.innerHTML=`<div class="empty"><div class="ei">📓</div><div class="et">No trades logged yet</div><div class="es">Go to the dashboard, find a trade play, tap the purple options line on any card, fill in your details and hit Save to Journal.</div><button class="ecta" onclick="window.location.href='index.html'">GO TO DASHBOARD →</button></div>`;
    return;
  }
  em.innerHTML='';
  tb.innerHTML=list.map((t,i)=>{
    const dt=t.logged_at?new Date(t.logged_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
    const tm=t.logged_at?new Date(t.logged_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):'';
    const typeTag=t.type==='CALL'?'<span class="call">CALL</span>':t.type==='PUT'?'<span class="put">PUT</span>':'<span style="color:var(--muted)">EQUITY</span>';
    return `<tr class="tr" onclick="tog(${i})">
      <td><div class="tt">${esc(t.ticker||'—')}</div><div class="tc">${esc(t.expiry||'')} ${typeTag}</div></td>
      <td><div class="td">${dt}</div><div class="td" style="color:var(--dim)">${tm}</div></td>
      <td><div class="tp">${t.entry||'—'}</div></td>
      <td><div class="tp">${t.strike||'—'}</div></td>
      <td><div class="tp" style="color:var(--bull-text)">${t.tp||'—'}</div><div class="ts" style="color:var(--bear-text)">SL ${t.sl||'—'}</div></td>
      <td><div class="tp">${t.qty||'—'}</div></td>
      <td><span class="badge bopen">OPEN</span></td>
    </tr>
    <tr class="dr" id="dr-${i}">
      <td colspan="7">
        <div class="dg">
          <div class="df"><div class="dl">Ticker</div><div class="dv" style="color:var(--gold)">${esc(t.ticker||'—')}</div></div>
          <div class="df"><div class="dl">Expiry</div><div class="dv">${esc(t.expiry||'—')}</div></div>
          <div class="df"><div class="dl">Type</div><div class="dv" style="color:${t.type==='CALL'?'#34d07a':'#f05252'}">${t.type||'—'}</div></div>
          <div class="df"><div class="dl">Contracts</div><div class="dv">${t.qty||'—'}</div></div>
          <div class="df"><div class="dl">Entry</div><div class="dv" style="color:var(--gold)">${t.entry||'—'}</div></div>
          <div class="df"><div class="dl">Strike</div><div class="dv" style="color:var(--gold)">${t.strike||'—'}</div></div>
          <div class="df"><div class="dl">Take Profit</div><div class="dv" style="color:var(--bull-text)">${t.tp||'—'}</div></div>
          <div class="df"><div class="dl">Stop Loss</div><div class="dv" style="color:var(--bear-text)">${t.sl||'—'}</div></div>
          ${t.note?`<div class="df dfull"><div class="dl">Notes</div><div class="dv" style="color:var(--text2);line-height:1.6">${esc(t.note)}</div></div>`:''}
          <div class="dact"><button class="delbtn" onclick="del(${i},event)">✕ DELETE</button></div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function tog(i){const r=document.getElementById('dr-'+i);if(r)r.classList.toggle('on');}
function del(i,e){
  e.stopPropagation();
  if(!confirm('Delete this trade?'))return;
  trades.splice(i,1);
  localStorage.setItem('narratrade-trades',JSON.stringify(trades));
  stats();render();
}
function clearAll(){
  if(!confirm('Delete ALL trades? This cannot be undone.'))return;
  localStorage.removeItem('narratrade-trades');
  trades=[];stats();render();
}
function exportCSV(){
  if(!trades.length){alert('No trades to export.');return;}
  const h=['Ticker','Expiry','Type','Strike','Entry','Contracts','TP','SL','Notes','Date'];
  const rows=trades.map(t=>[t.ticker,t.expiry,t.type,t.strike,t.entry,t.qty,t.tp,t.sl,t.note,t.logged_at].map(v=>'"'+(v||'').replace(/"/g,'""')+'"'));
  const csv=[h,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='narratrade-journal-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>

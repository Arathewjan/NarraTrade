<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NarraTrade — Economic Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c14;--surface:#0d1420;--surface2:#111927;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --text:#e8edf5;--muted:#6b7a96;--muted2:#3d4d66;
  --accent:#00e5a0;--accent2:#0095ff;--red:#ff4d6d;--gold:#f5c842;
  --font-d:'Syne',sans-serif;--font-m:'DM Mono',monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font-d);-webkit-font-smoothing:antialiased;font-size:13px}
.app-nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:62px;background:rgba(8,12,20,0.97);border-bottom:1px solid var(--border)}
.nav-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;text-decoration:none;color:var(--text)}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:4px}
.nav-link{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);text-decoration:none;transition:all 0.15s;font-family:var(--font-d)}
.nav-link:hover{color:var(--text);background:var(--surface2)}
.nav-link.active{background:var(--accent);color:#000}
.nav-right{display:flex;gap:10px;align-items:center}
.app-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px}
.nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#7b5ea7,#0095ff);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer}
.page{max-width:1080px;margin:0 auto;padding:30px 24px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;gap:16px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.page-sub{font-size:11px;color:var(--muted);font-family:var(--font-m);margin-top:3px}
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fil{font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:none;color:var(--muted);cursor:pointer;transition:all 0.15s}
.fil:hover{border-color:var(--border3);color:var(--text)}
.fil.on{background:rgba(0,229,160,0.08);color:var(--accent);border-color:rgba(0,229,160,0.3)}
.fil.on.hi{background:rgba(255,77,109,0.08);color:var(--red);border-color:rgba(255,77,109,0.3)}
.fil.on.er{background:rgba(0,149,255,0.08);color:var(--accent2);border-color:rgba(0,149,255,0.3)}
.week-nav{display:flex;align-items:center;gap:8px}
.wbtn{background:var(--surface);border:1px solid var(--border2);color:var(--muted);font-family:var(--font-m);font-size:11px;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all 0.15s}
.wbtn:hover{border-color:var(--border3);color:var(--text)}
.wlbl{font-family:var(--font-m);font-size:10px;color:var(--muted);min-width:150px;text-align:center}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.sc-lbl{font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.sc-val{font-size:20px;font-weight:800;font-family:var(--font-m);line-height:1.2}
.sc-sub{font-size:10px;color:var(--muted);font-family:var(--font-m);margin-top:3px}
.day-block{margin-bottom:20px}
.day-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.day-name{font-size:13px;font-weight:700}
.day-date{font-family:var(--font-m);font-size:10px;color:var(--muted)}
.day-cnt{font-family:var(--font-m);font-size:9px;color:var(--muted2);background:var(--surface2);padding:2px 8px;border-radius:10px;border:1px solid var(--border)}
.today-pill{font-family:var(--font-m);font-size:8px;font-weight:700;color:#000;background:var(--accent);padding:2px 9px;border-radius:10px;letter-spacing:1px}
.tbl{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.tbl-hdr{display:grid;grid-template-columns:80px 1fr 90px 90px 110px 110px 110px;padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border2);font-family:var(--font-m);font-size:8px;letter-spacing:1.5px;color:var(--muted2);text-transform:uppercase;gap:8px}
.tbl-row{display:grid;grid-template-columns:80px 1fr 90px 90px 110px 110px 110px;padding:13px 16px;border-bottom:1px solid var(--border);transition:background 0.15s;gap:8px;align-items:center}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--surface2)}
.ev-time{font-family:var(--font-m);font-size:11px;color:var(--muted)}
.ev-name{font-size:12px;font-weight:700;line-height:1.35}
.ev-cat{font-family:var(--font-m);font-size:9px;color:var(--muted2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.imp{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-m);font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:1px;white-space:nowrap}
.imp-hi{background:rgba(255,77,109,0.1);color:var(--red);border:1px solid rgba(255,77,109,0.25)}
.imp-md{background:rgba(245,200,66,0.08);color:var(--gold);border:1px solid rgba(245,200,66,0.2)}
.imp-lo{background:rgba(107,122,150,0.08);color:var(--muted);border:1px solid var(--border2)}
.imp-dot{width:5px;height:5px;border-radius:50%}
.dot-hi{background:var(--red)}.dot-md{background:var(--gold)}.dot-lo{background:var(--muted2)}
.ev-val{font-family:var(--font-m);font-size:11px;text-align:right}
.v-act{color:var(--accent);font-weight:700}
.v-est{color:var(--muted)}
.v-prv{color:var(--muted2)}
.v-nd{color:var(--muted2);font-size:10px}
.cat-tag{display:inline-block;font-family:var(--font-m);font-size:8px;padding:1px 6px;border-radius:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);text-transform:uppercase;letter-spacing:0.5px}
.cat-earnings{background:rgba(0,149,255,0.08);color:var(--accent2);border-color:rgba(0,149,255,0.2)}
.cat-macro{background:rgba(0,229,160,0.06);color:var(--accent);border-color:rgba(0,229,160,0.15)}
.cat-fed{background:rgba(245,200,66,0.08);color:var(--gold);border-color:rgba(245,200,66,0.2)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;color:var(--muted);gap:14px}
.spin{width:22px;height:22px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-family:var(--font-m);font-size:10px;letter-spacing:1px}
.empty{text-align:center;padding:60px;color:var(--muted);font-family:var(--font-m);font-size:11px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}
@media(max-width:900px){.tbl-hdr,.tbl-row{grid-template-columns:70px 1fr 80px 80px}}
</style>
</head>
<body>
<nav class="app-nav">
  <a class="nav-logo" href="index.html">NARRA<span>.</span>TRADE</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Live Feed</a>
    <span class="nav-link active">Calendar</span>
  </div>
  <div class="nav-right">
    <div class="app-badge">BETA</div>
    <div class="nav-avatar" id="navAvatar">M</div>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Economic Calendar</div>
      <div class="page-sub" id="pageSub">Loading events...</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;align-items:flex-end">
      <div class="week-nav">
        <button class="wbtn" onclick="shiftWeek(-1)">← Prev</button>
        <div class="wlbl" id="weekLbl">—</div>
        <button class="wbtn" onclick="shiftWeek(1)">Next →</button>
      </div>
      <div class="controls">
        <button class="fil on" onclick="setF('all',this)">ALL</button>
        <button class="fil hi" onclick="setF('high',this)">🔴 HIGH IMPACT</button>
        <button class="fil er" onclick="setF('earnings',this)">📊 EARNINGS</button>
        <button class="fil" onclick="setF('macro',this)">📈 MACRO</button>
        <button class="fil" onclick="setF('fed',this)">🏦 FED</button>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="sc"><div class="sc-lbl">Total Events</div><div class="sc-val" id="sTot">—</div><div class="sc-sub">This period</div></div>
    <div class="sc"><div class="sc-lbl">High Impact</div><div class="sc-val" id="sHi" style="color:var(--red)">—</div><div class="sc-sub">Market-moving</div></div>
    <div class="sc"><div class="sc-lbl">Earnings</div><div class="sc-val" id="sEarn" style="color:var(--accent2)">—</div><div class="sc-sub">Company reports</div></div>
    <div class="sc"><div class="sc-lbl">Next Event</div><div class="sc-val" id="sNext" style="font-size:13px">—</div><div class="sc-sub" id="sNextT">—</div></div>
  </div>

  <div id="calBody"><div class="loading"><div class="spin"></div><p>LOADING CALENDAR...</p></div></div>
</div>

<script>
const SB_URL='https://bjbvtwqckknngaamuaam.supabase.co';
const SB_KEY='sb_publishable_f_j6gPsZNgBqVFWAt6wKRg_pgJkQx7P';
const sb=supabase.createClient(SB_URL,SB_KEY);

let allEvents=[],activeFilter='all',weekOffset=0;

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(!session?.user){window.location.href='onboarding.html';return;}
  const name=session.user.user_metadata?.full_name||session.user.email.split('@')[0];
  document.getElementById('navAvatar').textContent=name.charAt(0).toUpperCase();
  loadCalendar();
})();

function getRange(offset){
  const now=new Date();
  const day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+(offset*7));
  mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  return{from:mon,to:sun};
}
function fmt(d){return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();}
function updateWeekLbl(){
  const{from,to}=getRange(weekOffset);
  const o={month:'short',day:'numeric'};
  document.getElementById('weekLbl').textContent=from.toLocaleDateString('en-US',o)+' – '+to.toLocaleDateString('en-US',{...o,year:'numeric'});
}

async function loadCalendar(){
  updateWeekLbl();
  document.getElementById('calBody').innerHTML='<div class="loading"><div class="spin"></div><p>LOADING CALENDAR...</p></div>';
  const{from,to}=getRange(weekOffset);
  document.getElementById('pageSub').textContent='Showing '+fmt(from)+' to '+fmt(to)+' · Finnhub + Scheduled Events';
  try{
    const r=await fetch('/api/calendar');
    if(!r.ok)throw new Error('API error '+r.status);
    const data=await r.json();
    // Filter to week range
    allEvents=(data.events||[]).filter(e=>{
      const d=new Date((e.time||e.date)+'T00:00:00');
      return d>=from&&d<=to;
    });
    // If no events in this specific week, show all from API
    if(!allEvents.length) allEvents=data.events||[];
    updateStats();
    render();
  }catch(e){
    document.getElementById('calBody').innerHTML=`<div class="empty">Failed to load: ${e.message}<br><br><button onclick="loadCalendar()" style="font-family:var(--font-m);font-size:10px;background:none;border:1px solid var(--border2);color:var(--muted);padding:8px 20px;cursor:pointer;border-radius:20px;margin-top:12px">↺ Retry</button></div>`;
  }
}

function shiftWeek(d){weekOffset+=d;loadCalendar();}
function setF(f,btn){
  activeFilter=f;
  document.querySelectorAll('.fil').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function impLvl(e){
  const i=(e.impact||'').toLowerCase();
  if(i==='high'||i==='3') return 'high';
  if(i==='medium'||i==='med'||i==='2') return 'medium';
  return 'low';
}

function updateStats(){
  const tot=allEvents.length;
  const hi=allEvents.filter(e=>impLvl(e)==='high').length;
  const earn=allEvents.filter(e=>e.category==='earnings').length;
  document.getElementById('sTot').textContent=tot;
  document.getElementById('sHi').textContent=hi;
  document.getElementById('sEarn').textContent=earn;
  const now=Date.now();
  const up=allEvents.filter(e=>new Date(e.time||e.date)>now).sort((a,b)=>new Date(a.time||a.date)-new Date(b.time||b.date));
  if(up.length){
    const n=up[0];
    document.getElementById('sNext').textContent=(n.event||n.name||'—').slice(0,20);
    const t=new Date(n.time||n.date);
    document.getElementById('sNextT').textContent=t.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'America/New_York'});
  }
}

function render(){
  let list=allEvents;
  if(activeFilter==='high') list=allEvents.filter(e=>impLvl(e)==='high');
  else if(activeFilter!=='all') list=allEvents.filter(e=>e.category===activeFilter);
  if(!list.length){document.getElementById('calBody').innerHTML='<div class="empty">No events for this filter.</div>';return;}

  const groups={};
  list.forEach(e=>{const d=(e.time||e.date||'').slice(0,10);if(!groups[d])groups[d]=[];groups[d].push(e);});
  const todayStr=fmt(new Date());

  let html='';
  Object.keys(groups).sort().forEach(ds=>{
    const evs=groups[ds];
    const dt=new Date(ds+'T12:00:00');
    html+=`<div class="day-block">
      <div class="day-hdr">
        <div class="day-name">${dt.toLocaleDateString('en-US',{weekday:'long'})}</div>
        <div class="day-date">${dt.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
        <div class="day-cnt">${evs.length} event${evs.length!==1?'s':''}</div>
        ${ds===todayStr?'<div class="today-pill">TODAY</div>':''}
      </div>
      <div class="tbl">
        <div class="tbl-hdr"><div>Time ET</div><div>Event</div><div>Category</div><div>Impact</div><div style="text-align:right">Actual</div><div style="text-align:right">Estimate</div><div style="text-align:right">Previous</div></div>
        ${evs.map(e=>row(e)).join('')}
      </div>
    </div>`;
  });
  document.getElementById('calBody').innerHTML=html;
}

function row(e){
  const imp=impLvl(e);
  const ic={high:'imp-hi',medium:'imp-md',low:'imp-lo'}[imp];
  const il={high:'HIGH',medium:'MED',low:'LOW'}[imp];
  const dc={high:'dot-hi',medium:'dot-md',low:'dot-lo'}[imp];
  let tStr='TBD';
  if(e.time){const t=new Date(e.time);if(!isNaN(t))tStr=t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'America/New_York'});}
  const ha=e.actual!=null&&e.actual!=='';
  const act=ha?`<span class="v-act">${esc(String(e.actual))}</span>`:'<span class="v-nd">Pending</span>';
  const est=e.estimate!=null&&e.estimate!==''?`<span class="v-est">${esc(String(e.estimate))}</span>`:'<span class="v-nd">—</span>';
  const prv=e.prev!=null&&e.prev!==''?`<span class="v-prv">${esc(String(e.prev))}</span>`:'<span class="v-nd">—</span>';
  const cat=e.category||'macro';
  return`<div class="tbl-row">
    <div class="ev-time">${tStr}</div>
    <div><div class="ev-name">${esc(e.event||e.name||'—')}</div><div class="ev-cat">${esc(e.country||'US')}</div></div>
    <div><span class="cat-tag cat-${cat}">${cat.toUpperCase()}</span></div>
    <div><span class="imp ${ic}"><span class="imp-dot ${dc}"></span>${il}</span></div>
    <div class="ev-val">${act}</div>
    <div class="ev-val">${est}</div>
    <div class="ev-val">${prv}</div>
  </div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>

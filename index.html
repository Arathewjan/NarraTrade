<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NarraTrade</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c14;--surface:#0d1420;--surface2:#111927;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --text:#e8edf5;--muted:#6b7a96;--muted2:#3d4d66;
  --accent:#00e5a0;--accent2:#0095ff;--accent3:#7b5ea7;--red:#ff4d6d;--gold:#f5c842;
  --bull:#00e5a0;--bull-text:#00e5a0;--bull-light:rgba(0,229,160,0.08);--bull-mid:rgba(0,229,160,0.25);
  --bear:#ff4d6d;--bear-text:#ff4d6d;--bear-light:rgba(255,77,109,0.08);--bear-mid:rgba(255,77,109,0.25);
  --neut:#f5c842;--neut-text:#f5c842;--neut-light:rgba(245,200,66,0.08);--neut-mid:rgba(245,200,66,0.25);
  --long-c:#4a9eff;--long-bg:rgba(74,158,255,0.08);--long-b:rgba(74,158,255,0.22);
  --short-c:#f05252;--short-bg:rgba(240,82,82,0.08);--short-b:rgba(240,82,82,0.22);
  --comm-c:#f5c842;--comm-bg:rgba(245,200,66,0.08);--comm-b:rgba(245,200,66,0.22);
  --options-c:#b06aff;--options-bg:rgba(176,106,255,0.08);--options-b:rgba(176,106,255,0.25);
  --day-c:#f5a623;--day-bg:rgba(245,166,35,0.08);--day-b:rgba(245,166,35,0.25);
  --swing-c:#4a9eff;--swing-bg:rgba(74,158,255,0.08);--swing-b:rgba(74,158,255,0.25);
  --macro-c:#00e5a0;--macro-bg:rgba(0,229,160,0.08);--macro-b:rgba(0,229,160,0.22);
  --investor-c:#c8a96e;--investor-bg:rgba(200,169,110,0.08);--investor-b:rgba(200,169,110,0.22);
  --font-d:'Syne',sans-serif;--font-m:'DM Mono',monospace;--font-s:'Instrument Serif',serif;
}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-d);font-size:13px;-webkit-font-smoothing:antialiased}

/* ── APP NAV ── */
.app-nav{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:62px;
  background:rgba(8,12,20,0.97);
  border-bottom:1px solid var(--border)
}
.nav-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;cursor:pointer}
.nav-logo span{color:var(--accent)}
.app-right{display:flex;gap:10px;align-items:center}
.app-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer}
.app-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px}
.user-label{font-family:var(--font-m);font-size:9px;color:var(--muted)}
.live-pill{display:flex;align-items:center;gap:6px;font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;color:var(--bull-text);cursor:pointer;padding:5px 13px;border-radius:20px;border:1.5px solid var(--bull-mid);background:var(--bull-light);transition:all 0.2s}
.live-pill:hover{background:rgba(0,229,160,0.12)}
.live-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.header-clock{font-family:var(--font-m);font-size:11px;color:var(--muted)}
.nav-journal-link{font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;color:var(--muted);text-decoration:none;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);transition:all .15s}
.nav-journal-link:hover{color:var(--accent);border-color:rgba(0,229,160,0.3)}

/* REFRESH BAR */

/* DASHBOARD LAYOUT */
.dash-layout{display:grid;grid-template-columns:216px 1fr;min-height:calc(100vh - 64px)}

/* SIDEBAR */
.dash-sidebar{background:var(--surface);border-right:1px solid var(--border);padding:22px 14px;display:flex;flex-direction:column;gap:2px;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
.pages-wrapper{min-width:0}
.sidebar-section{margin-bottom:22px}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);font-family:var(--font-m);padding:0 10px;margin-bottom:6px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all 0.15s;color:var(--muted);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;font-family:var(--font-d)}
.sidebar-item svg{width:15px;height:15px;flex-shrink:0}
.sidebar-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-item.active{background:rgba(0,229,160,0.1);color:var(--accent)}
.sidebar-item .sbadge{margin-left:auto;background:var(--accent);color:#000;font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px}

.persona-bar-side{padding:10px 12px;margin-top:4px}
.persona-bar-label{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);font-family:var(--font-m);margin-bottom:8px}
.active-persona-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid;margin-bottom:4px}
.active-persona-pill.day{color:var(--day-c);background:var(--day-bg);border-color:var(--day-b)}
.active-persona-pill.swing{color:var(--swing-c);background:var(--swing-bg);border-color:var(--swing-b)}
.active-persona-pill.macro{color:var(--macro-c);background:var(--macro-bg);border-color:var(--macro-b)}
.active-persona-pill.investor{color:var(--investor-c);background:var(--investor-bg);border-color:var(--investor-b)}
.persona-pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.persona-bar-edit{font-family:var(--font-m);font-size:8px;letter-spacing:1px;color:var(--muted);background:none;border:1px solid var(--border2);padding:4px 10px;border-radius:20px;cursor:pointer;margin-top:6px;transition:all 0.2s;display:block}
.persona-bar-edit:hover{border-color:rgba(0,229,160,0.3);color:var(--accent)}

.sidebar-watchlist{margin-top:auto}
.watch-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;cursor:pointer;transition:all 0.15s}
.watch-item:hover{background:var(--surface2)}
.watch-sym{font-size:12px;font-weight:700;font-family:var(--font-m)}
.watch-price{font-size:10px;font-family:var(--font-m);color:var(--muted)}
.watch-chg{font-size:11px;font-family:var(--font-m);font-weight:600}
.watch-chg.up{color:var(--bull)}.watch-chg.dn{color:var(--red)}

/* PAGES */
.dash-page{display:none}
.dash-page.active{display:block}

/* ── OVERVIEW PAGE ── */
.overview-main{padding:26px 30px}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.page-title{font-size:21px;font-weight:800;letter-spacing:-0.5px}
.page-sub{font-size:11px;color:var(--muted);font-family:var(--font-m);margin-top:2px}
.dash-search{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--muted);font-size:13px;cursor:pointer}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px;position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;top:0;right:0;width:55px;height:55px;border-radius:0 13px 0 55px;opacity:0.08}
.kpi-card.green::after{background:var(--accent)}.kpi-card.blue::after{background:var(--accent2)}
.kpi-card.purple::after{background:var(--accent3)}.kpi-card.gold::after{background:var(--gold)}
.kpi-label{font-size:10px;color:var(--muted);font-family:var(--font-m);margin-bottom:9px;letter-spacing:0.5px}
.kpi-val{font-size:24px;font-weight:800;letter-spacing:-1px;margin-bottom:5px}
.kpi-sub{font-size:10px;font-family:var(--font-m)}
.kpi-sub.up{color:var(--accent)}.kpi-sub.neu{color:var(--muted)}

.chart-row{display:grid;grid-template-columns:1fr 250px;gap:14px;margin-bottom:20px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:20px}
.chart-title{font-size:13px;font-weight:700;margin-bottom:3px}
.chart-sub{font-size:11px;color:var(--muted);font-family:var(--font-m);margin-bottom:14px}
.chart-tabs{display:flex;gap:3px}
.chart-tab{padding:4px 11px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);transition:all 0.15s;border:none;background:none;font-family:var(--font-d)}
.chart-tab.active{background:var(--surface2);color:var(--text)}

.donut-wrap{display:flex;flex-direction:column;align-items:center;padding:4px 0}
.donut-legend{width:100%;display:flex;flex-direction:column;gap:6px;margin-top:12px}
.donut-item{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.donut-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:8px}
.donut-name{display:flex;align-items:center;color:var(--muted)}
.donut-pct{font-family:var(--font-m);font-weight:600;font-size:11px}

.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.panel-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:20px}
.panel-card-title{font-size:13px;font-weight:700;margin-bottom:14px}

/* fear & greed */
#fgVal{font-size:32px;font-weight:800;font-family:var(--font-m);color:var(--text);text-align:center;line-height:1;margin-top:-4px}
#fgLbl{font-size:10px;font-weight:700;text-align:center;margin-top:4px;color:var(--muted)}

.cal-item{display:flex;align-items:center;gap:12px;padding:10px;background:var(--surface2);border-radius:9px;margin-bottom:7px}
.cal-item:last-child{margin-bottom:0}
.cal-dot{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.cal-event{font-size:12px;font-weight:700;margin-bottom:2px}
.cal-meta{font-size:10px;color:var(--muted);font-family:var(--font-m)}
.cal-impact{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:auto;font-family:var(--font-m)}

/* ── SIGNALS PAGE ── */
.signals-main{padding:26px 30px}
.signals-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.sig-filters{display:flex;gap:6px}
.sig-filter{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);background:var(--surface);border:1px solid var(--border);transition:all 0.15s;font-family:var(--font-m)}
.sig-filter.active{background:rgba(0,229,160,0.1);color:var(--accent);border-color:rgba(0,229,160,0.3)}

.signals-grid{display:grid;grid-template-columns:1fr 300px;gap:18px}
.article-feed{display:flex;flex-direction:column;gap:11px}
.article-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.article-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.article-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.article-card.bull::before{background:var(--accent)}.article-card.bear::before{background:var(--red)}.article-card.neu::before{background:var(--muted2)}
.article-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.article-headline{font-size:13px;font-weight:700;line-height:1.4;flex:1}
.article-sentiment{flex-shrink:0;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.article-sentiment.bull{background:rgba(0,229,160,0.12);color:var(--accent)}
.article-sentiment.bear{background:rgba(255,77,109,0.12);color:var(--red)}
.article-sentiment.neu{background:rgba(107,122,150,0.1);color:var(--muted)}
.article-body{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:10px;font-family:var(--font-m)}
.article-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.article-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;font-family:var(--font-m)}
.article-tag.bull{background:rgba(0,229,160,0.1);color:var(--accent)}
.article-tag.bear{background:rgba(255,77,109,0.1);color:var(--red)}
.article-tag.neu{background:var(--surface2);color:var(--muted)}
.article-ticker{font-size:9px;font-weight:700;font-family:var(--font-m);background:var(--surface2);padding:2px 7px;border-radius:4px}
.article-source{font-size:10px;color:var(--muted2);font-family:var(--font-m);margin-left:auto}

.signal-panel{display:flex;flex-direction:column;gap:11px}
.signal-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px}
.signal-card-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:var(--font-m);margin-bottom:11px}
.sig-item{background:var(--surface2);border-radius:9px;padding:12px;margin-bottom:7px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s}
.sig-item:last-child{margin-bottom:0}
.sig-item:hover{border-color:var(--border2)}
.sig-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.sig-sym{font-size:14px;font-weight:800;font-family:var(--font-m)}
.sig-dir{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:1px;text-transform:uppercase}
.sig-dir.long{background:rgba(0,229,160,0.15);color:var(--accent)}
.sig-dir.short{background:rgba(255,77,109,0.15);color:var(--red)}
.sig-setup{font-size:10px;color:var(--muted);font-family:var(--font-m);margin-bottom:7px}
.sig-conf-row{display:flex;align-items:center;gap:8px}
.sig-bar{flex:1;height:3px;border-radius:2px;background:var(--border2);overflow:hidden}
.sig-bar-fill{height:100%;border-radius:2px}
.sig-bar-fill.long{background:linear-gradient(90deg,var(--accent2),var(--accent))}
.sig-bar-fill.short{background:linear-gradient(90deg,var(--accent3),var(--red))}
.sig-conf-pct{font-size:11px;font-weight:700;font-family:var(--font-m)}
.sig-conf-pct.long-c{color:var(--accent)}.sig-conf-pct.short-c{color:var(--red)}

.ai-pulse{background:linear-gradient(135deg,rgba(0,229,160,0.07),rgba(0,149,255,0.06));border:1px solid rgba(0,229,160,0.15);border-radius:11px;padding:14px}
.ai-pulse-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 2s ease-in-out infinite}
.ai-pulse-label{font-size:10px;font-weight:700;color:var(--accent);font-family:var(--font-m);letter-spacing:1px}
.ai-pulse-text{font-size:11px;color:var(--muted);line-height:1.6;font-family:var(--font-m)}

/* ── NEWS FEED PAGE ── */
.feed-page{padding:0}
.feed-bars{background:var(--bg)}

.persona-bar-top{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;height:46px;gap:10px}
.persona-bar-label-top{font-family:var(--font-m);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-right:6px}
.persona-bar-edit-top{font-family:var(--font-m);font-size:8px;letter-spacing:1.5px;color:var(--muted);background:none;border:1px solid var(--border2);padding:4px 12px;border-radius:20px;cursor:pointer;margin-left:auto;transition:all 0.2s}
.persona-bar-edit-top:hover{border-color:rgba(0,229,160,0.3);color:var(--accent)}

.signal-legend{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;height:38px}
.legend-label{font-family:var(--font-m);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-right:18px}
.legend-item{display:flex;align-items:center;gap:7px;padding:0 16px;height:100%;border-right:1px solid var(--border);font-size:11px;font-weight:700}
.legend-item:first-of-type{border-left:1px solid var(--border)}
.legend-swatch{width:18px;height:4px;border-radius:3px}
.sw-bull{background:var(--bull)}.sw-bear{background:var(--bear)}.sw-neut{background:var(--neut)}
.legend-item.bull{color:var(--bull-text)}.legend-item.bear{color:var(--bear-text)}.legend-item.neut{color:var(--neut-text)}
.legend-desc{font-family:var(--font-m);font-size:8px;color:var(--muted);font-weight:400}

.filter-bar{background:var(--bg);padding:0 32px;display:flex;align-items:center;height:42px;gap:2px;overflow-x:auto;border-bottom:1px solid var(--border)}
.filter-btn{font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:0 12px;height:26px;border:1px solid transparent;background:none;color:var(--muted);cursor:pointer;border-radius:13px;transition:all 0.15s;white-space:nowrap}
.filter-btn:hover{color:var(--text);background:var(--surface);border-color:var(--border2)}
.filter-btn.active{color:var(--accent);background:rgba(0,229,160,0.07);border-color:rgba(0,229,160,0.25);font-weight:600}
.filter-sep{width:1px;height:16px;background:var(--border2);margin:0 2px;flex-shrink:0}

.feed-layout{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 260px)}
.feed{padding:22px 28px;background:var(--bg);border-right:1px solid var(--border)}
.feed-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.feed-label{font-family:var(--font-m);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.feed-label::before{content:'';width:3px;height:10px;background:var(--accent);border-radius:2px}
.story-count{font-family:var(--font-m);font-size:10px;color:var(--muted)}
.last-fetch{font-family:var(--font-m);font-size:9px;color:var(--muted2);margin-right:8px}
#personaNoticeWrap{margin-bottom:16px}
.persona-notice{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:12px;border:1px solid}
.persona-notice.day{background:var(--day-bg);border-color:var(--day-b);color:var(--day-c)}
.persona-notice.swing{background:var(--swing-bg);border-color:var(--swing-b);color:var(--swing-c)}
.persona-notice.macro{background:var(--macro-bg);border-color:var(--macro-b);color:var(--macro-c)}
.persona-notice.investor{background:var(--investor-bg);border-color:var(--investor-b);color:var(--investor-c)}

/* NEWS CARDS */
.news-card{
  background:var(--surface);border:1px solid var(--border2);border-radius:14px;
  margin-bottom:10px;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;
  animation:cardIn 0.35s ease both;cursor:pointer
}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.news-card.bullish{border-left:4px solid var(--bull)}
.news-card.bearish{border-left:4px solid var(--bear)}
.news-card.mixed{border-left:4px solid var(--neut)}
.news-card:hover{border-color:var(--border3);box-shadow:0 4px 20px rgba(0,0,0,0.35)}
.news-card.expanded{box-shadow:0 6px 32px rgba(0,0,0,0.4)}

/* collapsed view — matches screenshot */
.card-collapsed{padding:16px 20px}
.card-collapsed-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:10px}
.card-headline-main{font-size:15px;font-weight:700;line-height:1.35;color:var(--text);flex:1}
.card-sentiment-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.card-sentiment-icon.bull{background:rgba(0,229,160,0.12);color:var(--accent)}
.card-sentiment-icon.bear{background:rgba(255,77,109,0.12);color:var(--red)}
.card-sentiment-icon.neu{background:rgba(245,200,66,0.1);color:var(--gold)}
.card-summary-text{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:10px;font-family:var(--font-m)}

const SB_URL='https://bjbvtwqckknngaamuaam.supabase.co';
const SB_KEY='sb_publishable_f_j6gPsZNgBqVFWAt6wKRg_pgJkQx7P';
const sb=supabase.createClient(SB_URL,SB_KEY);

const PC={
  day:['geopolitical','macro','general','forex'],
  swing:['earnings','crypto','merger','commodities'],
  macro:['geopolitical','macro','general','forex'],

const PM={
  day:{name:'Day Trader',icon:'⚡',cls:'day'},
  swing:{name:'Swing Trader',icon:'📈',cls:'swing'},

};

let stories=[],filter='all',personas=[],refreshTimer,countdown=300,user=null;

// ── AUTH GUARD ─────────────────────────
(async()=>{
  try {
    const{data:{session}}=await sb.auth.getSession();
    if(!session?.user){window.location.href='onboarding.html';return;}
    user=session.user;
    const name=user.user_metadata?.full_name||user.email.split('@')[0];
    document.getElementById('userAvatar').textContent=name.charAt(0).toUpperCase();
    const hr=new Date().getHours();
    const greet=document.getElementById('greeting');
    if(greet)greet.textContent=(hr<12?'Good morning':hr<17?'Good afternoon':'Good evening')+', '+name.split(' ')[0]+' 👋';
    const ds=document.getElementById('dateStr');
    if(ds)ds.textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

    const{data:p}=await sb.from('profiles').select('personas').eq('id',user.id).single();
    if(p?.personas?.length){personas=p.personas;localStorage.setItem('narratrade-personas',JSON.stringify(personas));}
    else{const s=localStorage.getItem('narratrade-personas');personas=s?JSON.parse(s):[];if(!personas.length){window.location.href='onboarding.html';return;}}
    localStorage.setItem('narratrade-personas',JSON.stringify(personas));

    renderPersonaPills();
    loadWatchlist();
    setInterval(loadSidebar,120000);

    // Load feed immediately — don't wait for anything else
    window._feedLoaded=true;
    loadFeed();
  } catch(err) {
    console.error('Init error:',err);
    // Even on error, try to load the feed
    if(!window._feedLoaded){window._feedLoaded=true;loadFeed();}
  }
})();

// ── DOM READY FALLBACK ──
document.addEventListener('DOMContentLoaded',async()=>{
  if(window._feedLoaded)return;
  const{data:{session}}=await sb.auth.getSession();
  if(session&&!window._feedLoaded){window._feedLoaded=true;loadFeed();}
});

// ── AUTH STATE CHANGE (catches late session resolution) ──
sb.auth.onAuthStateChange(async(event,session)=>{
  if((event==='SIGNED_IN'||event==='INITIAL_SESSION')&&session&&!window._feedLoaded){
    window._feedLoaded=true;
    const{data:p}=await sb.from('profiles').select('personas').eq('id',session.user.id).single();
    if(p?.personas?.length){personas=p.personas;localStorage.setItem('narratrade-personas',JSON.stringify(personas));}
    else{const s=localStorage.getItem('narratrade-personas');personas=s?JSON.parse(s):[];}
    if(personas.length){renderPersonaPills();setTimeout(loadFeed,150);}
    else window.location.href='onboarding.html';
  }
});

    if(id==='overview')updateKPIs();

}

function renderPortfolioSim(trades, startingBalance){
  const canvas=document.getElementById('portfolioChart');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth*window.devicePixelRatio||600;
  canvas.height=140*window.devicePixelRatio||140;
  ctx.scale(window.devicePixelRatio||1,window.devicePixelRatio||1);
  const W=canvas.offsetWidth||600,H=140;

  // Build equity curve from trades
  // Each trade: entry premium * qty * 100 = cost. Simulate random outcome between SL and TP.
  const base=startingBalance||10000;
  let simStart=parseFloat(localStorage.getItem('narratrade-sim-start')||base);
  document.getElementById('simStart').textContent='$'+simStart.toLocaleString('en-US',{maximumFractionDigits:0});
  document.getElementById('simTrades').textContent=trades.length;

  // Build equity points: start at simStart, each trade moves it
  const points=[simStart];
  let running=simStart;
  [...trades].reverse().forEach(t=>{
    const entry=parseFloat((t.entry||'').replace(/[$,]/g,''))||0;
    const tp=parseFloat((t.tp||'').replace(/[$,]/g,''))||0;
    const sl=parseFloat((t.sl||'').replace(/[$,]/g,''))||0;
    const qty=parseInt(t.qty)||1;
    if(!entry)return;
    // Simulate: weight toward TP 55% of time (slight edge)
    const win=Math.random()<0.55;
    const pnl=win?(tp-entry)*qty*100:(sl-entry)*qty*100;
    running+=pnl;
    points.push(Math.max(running,0));
  });

  if(points.length<2){
    // No trades — draw flat line
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='rgba(0,229,160,0.3)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
    document.getElementById('simPnl').textContent='$0';
    document.getElementById('simPnl').style.color='var(--muted)';
    return;
  }

  const minV=Math.min(...points),maxV=Math.max(...points);
  const range=maxV-minV||1;
  const pad=16;
  const xStep=(W-pad*2)/(points.length-1);
  const yPos=v=>pad+(1-(v-minV)/range)*(H-pad*2);
  const pts=points.map((v,i)=>({x:pad+i*xStep,y:yPos(v)}));

  ctx.clearRect(0,0,W,H);

  // Gradient fill
  const grad=ctx.createLinearGradient(0,0,0,H);
  const finalUp=points[points.length-1]>=points[0];
  if(finalUp){grad.addColorStop(0,'rgba(0,229,160,0.2)');grad.addColorStop(1,'rgba(0,229,160,0)');}
  else{grad.addColorStop(0,'rgba(255,77,109,0.15)');grad.addColorStop(1,'rgba(255,77,109,0)');}
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H);ctx.lineTo(pts[0].x,H);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=finalUp?'#00e5a0':'#ff4d6d';ctx.lineWidth=2;ctx.setLineDash([]);ctx.stroke();

  // Dots at each trade
  pts.forEach((p,i)=>{
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle=finalUp?'#00e5a0':'#ff4d6d';ctx.fill();
  });

  // P&L display
  const pnl=running-simStart;
  const pnlEl=document.getElementById('simPnl');
  pnlEl.textContent=(pnl>=0?'+$':'-$')+Math.abs(pnl).toLocaleString('en-US',{maximumFractionDigits:0});
  pnlEl.style.color=pnl>=0?'var(--accent)':'var(--red)';
}

async function loadFeed(){
  setPill('loading','FETCHING WIRE...');
  fc(`<div class="feed-loading"><div class="big-spin"></div><p>PULLING NARRATRADE LIVE WIRE...</p><small>Reuters · Dow Jones · MarketWatch</small></div>`);
  try{
    // Step 1: fetch news
    const nr=await fetch('/api/news?_='+Date.now());
    if(!nr.ok)throw new Error('News API error: '+nr.status);
    const raw=await nr.json();
    if(!raw||!raw.length)throw new Error('No stories returned from Finnhub');

    // Step 2: fetch AI briefs with 28s timeout (Vercel limit is 30s)
    fc(`<div class="feed-loading"><div class="big-spin"></div><p>ANALYZING ${raw.length} STORIES...</p><small>Claude is generating trade plays</small></div>`);
    // signalFeed removed — signals now live in sidebar

    // Show raw news immediately for fast load
    stories=raw.map((item,idx)=>({
      id:item.id||idx,headline:item.headline,summary:item.summary||'',
      source:item.source||'Finnhub',url:item.url||'',datetime:item.datetime,
      _cat:item._cat,impact:'mixed',category:item._cat||'general',oneLiner:'',plays:[]
    }));
    renderFeed();
    const sc=document.getElementById('storyCount');if(sc)sc.textContent=stories.length+' stories';
    setPill('loading','ANALYZING...');
    fc2(`<div class="feed-loading" style="padding:20px 0"><div class="big-spin"></div><p>AI GENERATING TRADE PLAYS...</p></div>`,true);

    // Then fetch AI briefs in background
    let briefs=[];
    try{
      const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),20000));
      const brFetch=fetch('/api/briefs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({newsItems:raw})});
      const br=await Promise.race([brFetch,timeout]);
      if(br.ok)briefs=await br.json();
      else console.warn('Briefs non-ok:',br.status);
    }catch(e){
      console.warn('Briefs timed out, keeping raw news:',e.message);
    }

    // Build stories — works even if briefs is empty
    stories=raw.map((item,idx)=>{
      const ai=(briefs&&briefs.find)?briefs.find(b=>b.i===idx)||briefs[idx]||{}:{};
      return{
        id:item.id||idx,
        headline:item.headline,
        summary:item.summary||'',
        source:item.source||'Finnhub',
        url:item.url||'',
        datetime:item.datetime,
        _cat:item._cat,
        impact:ai.impact||'mixed',
        category:ai.category||item._cat||'general',
        oneLiner:ai.oneLiner||'',
        plays:ai.plays||[]
      };
    });

    const now=new Date();
    const lf=document.getElementById('lastFetch'),sc=document.getElementById('storyCount');
    if(lf)lf.textContent='Updated '+now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    if(sc)sc.textContent=stories.length+' stories';

    if(document.querySelector('.ai-loading-bar'))document.querySelector('.ai-loading-bar').remove();
    renderNotice();renderFeed();renderSignalPage();renderTopPlays();loadSidebar();startCountdown();
    setPill('live','↺ REFRESH FEED');
    updateKPIs();

  }catch(err){
    console.error('loadFeed error:',err);
    const msg=err.message||'Unknown error';
    fc(`<div class="feed-loading" style="color:var(--red)"><p>FEED ERROR</p><small style="color:var(--muted);max-width:400px;text-align:center;line-height:1.6">${esc(msg)}</small><button onclick="loadFeed()" style="margin-top:16px;font-family:var(--font-m);font-size:10px;background:none;border:1px solid var(--red);color:var(--red);padding:8px 20px;cursor:pointer;border-radius:20px">↺ RETRY</button></div>`);
    // signalFeed removed
    setPill('error','↺ RETRY');
  }
}

  const bull=stories.filter(s=>s.impact==='bullish').slice(0,3);
  const bear=stories.filter(s=>s.impact==='bearish').slice(0,2);
  const top=[...bull,...bear];
  const sfEl=document.getElementById('signalFeed'); if(sfEl) sfEl.innerHTML=top.map(s=>{
    const cls={bullish:'bull',bearish:'bear',mixed:'neu'}[s.impact]||'neu';
    const icon={bullish:'↑',bearish:'↓',mixed:'–'}[s.impact]||'–';
    const cleanSummary=stripHtml(s.summary||'');
    const age=s.datetime?Math.round((Date.now()/1000-s.datetime)/60)+'m ago':'';
    return`<div class="article-card ${cls}">
      <div class="article-top"><div class="article-headline">${esc(s.headline)}</div><div class="article-sentiment ${cls}">${icon}</div></div>
      <div class="article-body">${esc(cleanSummary.slice(0,220))}${cleanSummary.length>220?'…':''}</div>
      <div class="article-footer">

        ${(s.plays||[]).slice(0,3).map(p=>`<div class="article-ticker">${esc(p.ticker)}</div>`).join('')}
        <div class="article-source">${esc(s.source)}${age?' · '+age:''}</div>
      </div>
    </div>`;
  }).join('')||'<div style="color:var(--muted);font-size:12px">No signals yet — refresh feed.</div>';

  // Signal items — real conviction values
  const topPlays=[];
  stories.forEach(s=>(s.plays||[]).forEach(p=>{if(p.conviction>=2)topPlays.push({...p,impact:s.impact});}));
  topPlays.sort((a,b)=>b.conviction-a.conviction);
  const convPct={1:'33%',2:'67%',3:'89%'};
  const convWidth={1:33,2:67,3:89};
  document.getElementById('signalItems').innerHTML=topPlays.slice(0,4).map(p=>{
    const isLong=p.direction==='LONG'||p.direction==='COMMODITY';
    const pct=convPct[p.conviction]||'67%';
    const w=convWidth[p.conviction]||67;
    return`<div class="sig-item"><div class="sig-top"><div class="sig-sym">${esc(p.ticker)}</div><div class="sig-dir ${isLong?'long':'short'}">${p.direction}</div></div><div class="sig-setup">${esc(p.rationale?.slice(0,60)||'')}${(p.rationale||'').length>60?'…':''}</div><div class="sig-conf-row"><div class="sig-bar"><div class="sig-bar-fill ${isLong?'long':'short'}" style="width:${w}%"></div></div><div class="sig-conf-pct ${isLong?'long-c':'short-c'}">${pct}</div></div></div>`;
  }).join('')||'<div style="color:var(--muted);font-size:10px">No high-conviction plays yet</div>';

  // Market pulse text
  const bullC=stories.filter(s=>s.impact==='bullish').length;
  const bearC=stories.filter(s=>s.impact==='bearish').length;
  const bias=bullC>bearC?'bullish':'bearish';
  document.getElementById('pulseTxt').innerHTML=`${stories.length} stories analyzed. Market narrative is skewing <span style="color:var(--${bias==='bullish'?'accent':'red'})">${bias}</span> — ${bullC} bullish vs ${bearC} bearish signals from live wire.`;

  // Sector flow — real data
  loadSignalSectors();
}

async function loadSignalSectors(){
  const sec=[{sym:'XLK',label:'Technology'},{sym:'XLF',label:'Financials'},{sym:'XLE',label:'Energy'},{sym:'XLV',label:'Healthcare'}];
  const results=[];
  for(const s of sec){
    try{
      const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${s.sym}?interval=1m&range=1d`);
      const meta=(await r.json())?.chart?.result?.[0]?.meta;
      const chg=meta?.chartPreviousClose?(meta.regularMarketPrice-meta.chartPreviousClose)/meta.chartPreviousClose*100:null;
      results.push({label:s.label,chg});
    }catch{results.push({label:s.label,chg:null});}
  }
  const el=document.getElementById('sectorSignal');if(!el)return;
  const mx=Math.max(...results.map(r=>Math.abs(r.chg||0)),0.01);
  el.innerHTML=results.map(r=>{
    const c=r.chg==null?'var(--muted)':r.chg>=0?'var(--accent)':'var(--red)';
    const w=r.chg==null?0:Math.abs(r.chg)/mx*100;
    const lbl=r.chg==null?'—':(r.chg>=0?'+':'')+r.chg.toFixed(2)+'%';
    return`<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-family:var(--font-m)">${r.label}</span><div style="display:flex;align-items:center;gap:8px"><div style="width:72px;height:3px;border-radius:2px;background:var(--border2);overflow:hidden"><div style="width:${w}%;height:100%;background:${c};border-radius:2px"></div></div><span style="color:${c};font-family:var(--font-m);font-size:10px">${lbl}</span></div></div>`;
  }).join('');
}

function renderPortfolioSim(trades, startingBalance){
  const canvas=document.getElementById('portfolioChart');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth*window.devicePixelRatio||600;
  canvas.height=140*window.devicePixelRatio||140;
  ctx.scale(window.devicePixelRatio||1,window.devicePixelRatio||1);
  const W=canvas.offsetWidth||600,H=140;

  // Build equity curve from trades
  // Each trade: entry premium * qty * 100 = cost. Simulate random outcome between SL and TP.
  const base=startingBalance||10000;
  let simStart=parseFloat(localStorage.getItem('narratrade-sim-start')||base);
  document.getElementById('simStart').textContent='$'+simStart.toLocaleString('en-US',{maximumFractionDigits:0});
  document.getElementById('simTrades').textContent=trades.length;

  // Build equity points: start at simStart, each trade moves it
  const points=[simStart];
  let running=simStart;
  [...trades].reverse().forEach(t=>{
    const entry=parseFloat((t.entry||'').replace(/[$,]/g,''))||0;
    const tp=parseFloat((t.tp||'').replace(/[$,]/g,''))||0;
    const sl=parseFloat((t.sl||'').replace(/[$,]/g,''))||0;
    const qty=parseInt(t.qty)||1;
    if(!entry)return;
    // Simulate: weight toward TP 55% of time (slight edge)
    const win=Math.random()<0.55;
    const pnl=win?(tp-entry)*qty*100:(sl-entry)*qty*100;
    running+=pnl;
    points.push(Math.max(running,0));
  });

  if(points.length<2){
    // No trades — draw flat line
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='rgba(0,229,160,0.3)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
    document.getElementById('simPnl').textContent='$0';
    document.getElementById('simPnl').style.color='var(--muted)';
    return;
  }

  const minV=Math.min(...points),maxV=Math.max(...points);
  const range=maxV-minV||1;
  const pad=16;
  const xStep=(W-pad*2)/(points.length-1);
  const yPos=v=>pad+(1-(v-minV)/range)*(H-pad*2);
  const pts=points.map((v,i)=>({x:pad+i*xStep,y:yPos(v)}));

  ctx.clearRect(0,0,W,H);

  // Gradient fill
  const grad=ctx.createLinearGradient(0,0,0,H);
  const finalUp=points[points.length-1]>=points[0];
  if(finalUp){grad.addColorStop(0,'rgba(0,229,160,0.2)');grad.addColorStop(1,'rgba(0,229,160,0)');}
  else{grad.addColorStop(0,'rgba(255,77,109,0.15)');grad.addColorStop(1,'rgba(255,77,109,0)');}
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H);ctx.lineTo(pts[0].x,H);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=finalUp?'#00e5a0':'#ff4d6d';ctx.lineWidth=2;ctx.setLineDash([]);ctx.stroke();

  // Dots at each trade
  pts.forEach((p,i)=>{
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle=finalUp?'#00e5a0':'#ff4d6d';ctx.fill();
  });

  // P&L display
  const pnl=running-simStart;
  const pnlEl=document.getElementById('simPnl');
  pnlEl.textContent=(pnl>=0?'+$':'-$')+Math.abs(pnl).toLocaleString('en-US',{maximumFractionDigits:0});
  pnlEl.style.color=pnl>=0?'var(--accent)':'var(--red)';
}

async function loadFeed(){
  setPill('loading','FETCHING WIRE...');
  fc(`<div class="feed-loading"><div class="big-spin"></div><p>PULLING NARRATRADE LIVE WIRE...</p><small>Reuters · Dow Jones · MarketWatch</small></div>`);
  try{
    // Step 1: fetch news
    const nr=await fetch('/api/news?_='+Date.now());
    if(!nr.ok)throw new Error('News API error: '+nr.status);
    const raw=await nr.json();
    if(!raw||!raw.length)throw new Error('No stories returned from Finnhub');

    // Step 2: fetch AI briefs with 28s timeout (Vercel limit is 30s)
    fc(`<div class="feed-loading"><div class="big-spin"></div><p>ANALYZING ${raw.length} STORIES...</p><small>Claude is generating trade plays</small></div>`);
    // signalFeed removed — signals now live in sidebar

    let briefs=[];
    try{
      const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),28000));
      const brFetch=fetch('/api/briefs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({newsItems:raw})});
      const br=await Promise.race([brFetch,timeout]);
      if(br.ok)briefs=await br.json();
      else console.warn('Briefs non-ok:',br.status);
    }catch(e){
      console.warn('Briefs failed/timed out, showing raw news:',e.message);
    }

    // Build stories — works even if briefs is empty
    stories=raw.map((item,idx)=>{
      const ai=(briefs&&briefs.find)?briefs.find(b=>b.i===idx)||briefs[idx]||{}:{};
      return{
        id:item.id||idx,
        headline:item.headline,
        summary:item.summary||'',
        source:item.source||'Finnhub',
        url:item.url||'',
        datetime:item.datetime,
        _cat:item._cat,
        impact:ai.impact||'mixed',
        category:ai.category||item._cat||'general',
        oneLiner:ai.oneLiner||'',
        plays:ai.plays||[]
      };
    });

    const now=new Date();
    const lf=document.getElementById('lastFetch'),sc=document.getElementById('storyCount');
    if(lf)lf.textContent='Updated '+now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    if(sc)sc.textContent=stories.length+' stories';

    renderNotice();renderFeed();renderSignalPage();renderTopPlays();loadSidebar();startCountdown();
    setPill('live','↺ REFRESH FEED');
    updateKPIs();

  }catch(err){
    console.error('loadFeed error:',err);
    const msg=err.message||'Unknown error';
    fc(`<div class="feed-loading" style="color:var(--red)"><p>FEED ERROR</p><small style="color:var(--muted);max-width:400px;text-align:center;line-height:1.6">${esc(msg)}</small><button onclick="loadFeed()" style="margin-top:16px;font-family:var(--font-m);font-size:10px;background:none;border:1px solid var(--red);color:var(--red);padding:8px 20px;cursor:pointer;border-radius:20px">↺ RETRY</button></div>`);
    // signalFeed removed
    setPill('error','↺ RETRY');
  }
}

function fc(html){const el=document.getElementById('feedContainer');if(el)el.innerHTML=html;}

// ── RENDER FEED ────────────────────────
function renderFeed(){
  const iF=['bearish','bullish','mixed'];
  let list=(filter==='all'?stories.filter(s=>s.impact!=='mixed'):stories.filter(s=>iF.includes(filter)?s.impact===filter:s.category===filter||s._cat===filter));
  const vis=list.filter(s=>matches(s)),hid=list.filter(s=>!matches(s));
  const sc=document.getElementById('storyCount');if(sc)sc.textContent=vis.length+' stories';
  if(!vis.length&&!hid.length){fc(`<div class="feed-loading"><p>NO STORIES IN THIS FILTER</p></div>`);return;}
  let html=vis.map((s,i)=>card(s,i)).join('');
  if(hid.length){
    html+=`<div style="font-family:var(--font-m);font-size:8px;letter-spacing:2px;color:var(--muted);margin:20px 0 12px;display:flex;align-items:center;gap:10px"><span style="flex:1;height:1px;background:var(--border)"></span>${hid.length} STORIES HIDDEN BY PERSONA FILTER<span style="flex:1;height:1px;background:var(--border)"></span></div>`;
    html+=hid.map(s=>`<div style="border:1px dashed var(--border2);border-radius:14px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:12px;opacity:0.4"><div style="font-size:18px">🔒</div><div style="flex:1"><div style="height:10px;background:var(--border2);border-radius:4px;margin-bottom:7px;width:65%"></div><div style="height:7px;background:var(--muted2);border-radius:4px;width:85%"></div></div><div style="font-family:var(--font-m);font-size:8px;color:var(--muted);padding:3px 9px;border:1px solid var(--border2);border-radius:20px">${esc(s.category?.toUpperCase()||'GENERAL')}</div></div>`).join('');
  }
  fc(html);
}

// ── SIGNALS PAGE ───────────────────────
function stripHtml(html){return(html||'').replace(/<[^>]*>/g,' ').replace(/&[a-z]+;/gi,m=>({'&amp;':'&','&lt;':'<','&gt;':'>','&nbsp;':' ','&quot;':'"','&#39;':"'"}[m]||m)).replace(/\s+/g,' ').trim();}

function renderSignalPage(){
  const bull=stories.filter(s=>s.impact==='bullish').slice(0,3);
  const bear=stories.filter(s=>s.impact==='bearish').slice(0,2);
  const top=[...bull,...bear];
  const sfEl=document.getElementById('signalFeed'); if(sfEl) sfEl.innerHTML=top.map(s=>{
    const cls={bullish:'bull',bearish:'bear',mixed:'neu'}[s.impact]||'neu';
    const icon={bullish:'↑',bearish:'↓',mixed:'–'}[s.impact]||'–';
    const cleanSummary=stripHtml(s.summary||'');
    const age=s.datetime?Math.round((Date.now()/1000-s.datetime)/60)+'m ago':'';
    return`<div class="article-card ${cls}">
      <div class="article-top"><div class="article-headline">${esc(s.headline)}</div><div class="article-sentiment ${cls}">${icon}</div></div>
      <div class="article-body">${esc(cleanSummary.slice(0,220))}${cleanSummary.length>220?'…':''}</div>
      <div class="article-footer">
        <div class="article-tag ${cls}">${s.impact?.toUpperCase()||'MIXED'}</div>
        ${(s.plays||[]).slice(0,3).map(p=>`<div class="article-ticker">${esc(p.ticker)}</div>`).join('')}
        <div class="article-source">${esc(s.source)}${age?' · '+age:''}</div>
      </div>
    </div>`;
  }).join('')||'<div style="color:var(--muted);font-size:12px">No signals yet — refresh feed.</div>';

  // Signal items — real conviction values
  const topPlays=[];
  stories.forEach(s=>(s.plays||[]).forEach(p=>{if(p.conviction>=2)topPlays.push({...p,impact:s.impact});}));
  topPlays.sort((a,b)=>b.conviction-a.conviction);
  const convPct={1:'33%',2:'67%',3:'89%'};
  const convWidth={1:33,2:67,3:89};
  document.getElementById('signalItems').innerHTML=topPlays.slice(0,4).map(p=>{
    const isLong=p.direction==='LONG'||p.direction==='COMMODITY';
    const pct=convPct[p.conviction]||'67%';
    const w=convWidth[p.conviction]||67;
    return`<div class="sig-item"><div class="sig-top"><div class="sig-sym">${esc(p.ticker)}</div><div class="sig-dir ${isLong?'long':'short'}">${p.direction}</div></div><div class="sig-setup">${esc(p.rationale?.slice(0,60)||'')}${(p.rationale||'').length>60?'…':''}</div><div class="sig-conf-row"><div class="sig-bar"><div class="sig-bar-fill ${isLong?'long':'short'}" style="width:${w}%"></div></div><div class="sig-conf-pct ${isLong?'long-c':'short-c'}">${pct}</div></div></div>`;
  }).join('')||'<div style="color:var(--muted);font-size:10px">No high-conviction plays yet</div>';

  // Market pulse text
  const bullC=stories.filter(s=>s.impact==='bullish').length;
  const bearC=stories.filter(s=>s.impact==='bearish').length;
  const bias=bullC>bearC?'bullish':'bearish';
  document.getElementById('pulseTxt').innerHTML=`${stories.length} stories analyzed. Market narrative is skewing <span style="color:var(--${bias==='bullish'?'accent':'red'})">${bias}</span> — ${bullC} bullish vs ${bearC} bearish signals from live wire.`;

  // Sector flow — real data
  loadSignalSectors();
}

async function loadSignalSectors(){
  const sec=[{sym:'XLK',label:'Technology'},{sym:'XLF',label:'Financials'},{sym:'XLE',label:'Energy'},{sym:'XLV',label:'Healthcare'}];
  const results=[];
  for(const s of sec){
    try{
      const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${s.sym}?interval=1m&range=1d`);
      const meta=(await r.json())?.chart?.result?.[0]?.meta;
      const chg=meta?.chartPreviousClose?(meta.regularMarketPrice-meta.chartPreviousClose)/meta.chartPreviousClose*100:null;
      results.push({label:s.label,chg});
    }catch{results.push({label:s.label,chg:null});}
  }
  const el=document.getElementById('sectorSignal');if(!el)return;
  const mx=Math.max(...results.map(r=>Math.abs(r.chg||0)),0.01);
  el.innerHTML=results.map(r=>{
    const c=r.chg==null?'var(--muted)':r.chg>=0?'var(--accent)':'var(--red)';
    const w=r.chg==null?0:Math.abs(r.chg)/mx*100;
    const lbl=r.chg==null?'—':(r.chg>=0?'+':'')+r.chg.toFixed(2)+'%';
    return`<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-family:var(--font-m)">${r.label}</span><div style="display:flex;align-items:center;gap:8px"><div style="width:72px;height:3px;border-radius:2px;background:var(--border2);overflow:hidden"><div style="width:${w}%;height:100%;background:${c};border-radius:2px"></div></div><span style="color:${c};font-family:var(--font-m);font-size:10px">${lbl}</span></div></div>`;
  }).join('');
}


// ── CARD BUILDER ───────────────────────
function toggleCard(id){
  const el=document.getElementById('nc-'+id);
  if(!el)return;
  el.classList.toggle('expanded');
}

function card(s,i){
  const ageMin=s.datetime?Math.round((Date.now()/1000-s.datetime)/60):null;
  const age=ageMin==null?'':ageMin<60?ageMin+'m ago':ageMin<1440?Math.floor(ageMin/60)+'h ago':Math.floor(ageMin/1440)+'d ago';
  const imp=s.impact||'mixed';
  const sentCls={bullish:'bull',bearish:'bear',mixed:'neu'}[imp]||'neu';
  const sentIcon={bullish:'↑',bearish:'↓',mixed:'–'}[imp]||'–';
  const pillCls={bullish:'pill-bull',bearish:'pill-bear',mixed:'pill-neu'}[imp]||'pill-neu';
  const pillLbl={bullish:'BULLISH',bearish:'BEARISH',mixed:'MIXED'}[imp]||'MIXED';
  const cleanSummary=stripHtml(s.summary||'');

  // Tickers from plays
  const tickers=[...new Set((s.plays||[]).map(p=>p.ticker).filter(Boolean))].slice(0,3);
  const tickerTags=tickers.map(t=>`<span class="card-ticker-tag">${esc(t)}</span>`).join('');

  // Trade rows (expanded)
  const tradeRows=(s.plays||[]).map(p=>{
    const isLong=p.direction==='LONG'||p.direction==='COMMODITY';
    const rowCls=p.direction==='LONG'?'long-r':p.direction==='SHORT'?'short-r':'comm-r';
    const dirCls=p.direction==='LONG'?'long':p.direction==='SHORT'?'short':'comm';
    const dots=[1,2,3].map(n=>`<div class="tr-dot${n<=p.conviction?' on':''}"></div>`).join('');
    const convLabel=['','LOW','MED','HIGH'][p.conviction]||'MED';
    const pid=`${s.id}-${p.ticker}`.replace(/[^a-zA-Z0-9]/g,'');
    const isCall=isLong;
    const exp=new Date(Date.now()+18*24*60*60*1000);
    const expStr=`${exp.getMonth()+1}/${String(exp.getDate()).padStart(2,'0')}/${exp.getFullYear()}`;
    return`<div class="trade-row ${rowCls}">
      <div class="tr-dir ${dirCls}">${p.direction}</div>
      <div class="tr-body">
        <div class="tr-ticker">${esc(p.ticker)}<span>${esc(p.name||'')}</span></div>
        <div class="tr-rationale">${esc(p.rationale||'')}</div>
        <div class="tr-rating"><div class="tr-dots">${dots}</div>CONVICTION: ${convLabel} · ${(p.type||'EQUITY').toUpperCase()}</div>
      </div>
    </div>
    <div class="options-placeholder">
      <span>📋</span>
      <span>${esc(p.ticker)} · ${expStr} · ${isCall?'CALL':'PUT'} · Options data coming with Tradier integration</span>
      <button class="log-btn" style="margin-top:0;margin-left:auto;flex-shrink:0" onclick="event.stopPropagation();openLog('${pid}','${esc(p.ticker)}','${expStr}','${isCall?'CALL':'PUT'}')">LOG TRADE</button>
    </div>
    <div class="log-drawer" id="log-${pid}" onclick="event.stopPropagation()">
      <div class="log-drawer-title">Log — ${esc(p.ticker)} ${expStr} ${isCall?'CALL':'PUT'}</div>
      <div class="log-row">
        <div class="log-field"><div class="log-lbl">Strike</div><input class="log-input" id="li-${pid}-strike" placeholder="e.g. $77.00"></div>
        <div class="log-field"><div class="log-lbl">Entry Premium</div><input class="log-input" id="li-${pid}-entry" placeholder="e.g. $1.95"></div>
        <div class="log-field"><div class="log-lbl">Contracts</div><input class="log-input" id="li-${pid}-qty" placeholder="e.g. 5"></div>
      </div>
      <div class="log-row">
        <div class="log-field"><div class="log-lbl">Take Profit</div><input class="log-input" id="li-${pid}-tp" placeholder="e.g. $4.00"></div>
        <div class="log-field"><div class="log-lbl">Stop Loss</div><input class="log-input" id="li-${pid}-sl" placeholder="e.g. $0.90"></div>
        <div class="log-field"><div class="log-lbl">Notes</div><input class="log-input" id="li-${pid}-note" placeholder="Your thesis..."></div>
      </div>
      <div class="log-actions">
        <button class="log-save-btn" onclick="saveLog('${pid}','${esc(p.ticker)}','${expStr}','${isCall?'CALL':'PUT'}')">SAVE TO JOURNAL</button>
        <span class="log-saved" id="ls-${pid}">✓ SAVED</span>
      </div>
    </div>`;
  }).join('');

  return`<div class="news-card ${imp}" id="nc-${s.id}" style="animation-delay:${i*0.04}s" onclick="toggleCard('${s.id}')">
    <div class="card-collapsed">
      <div class="card-collapsed-top">
        <div class="card-headline-main">${esc(s.headline)}</div>
        <div class="card-sentiment-icon ${sentCls}">${sentIcon}</div>
      </div>
      <div class="card-summary-text">${esc(cleanSummary.slice(0,180))}${cleanSummary.length>180?'…':''}</div>
      <div class="card-collapsed-footer">
        <span class="card-impact-pill ${pillCls}">${pillLbl}</span>
        ${tickerTags}
        <span class="card-meta-right">${esc(s.source)}${age?' · '+age:''}</span>
      </div>
    </div>
    <div class="card-expanded">
      <div class="expanded-inner">
        <div class="expanded-section-label">Trade Plays</div>
        ${tradeRows||'<div style="color:var(--muted);font-size:11px;font-family:var(--font-m)">No plays generated for this story.</div>'}
        <div id="analysis-${s.id}"></div>
      </div>
      <div class="expanded-footer">
        ${s.url?`<a class="story-link" href="${esc(s.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">READ FULL STORY →</a>`:'<span></span>'}
        <button class="deep-btn" id="btn-${s.id}" onclick="event.stopPropagation();deepAnalyze('${s.id}')">
          <div class="mini-spin" id="spin-${s.id}" style="width:10px;height:10px;border:1px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;display:none"></div>
          <span id="btnlabel-${s.id}">✦ Deep Analysis</span>
        </button>
      </div>
    </div>
  </div>`;
}

function openLog(pid,ticker,expiry,type){
  const drawer=document.getElementById('log-'+pid);
  if(!drawer)return;
  // Close all other drawers
  document.querySelectorAll('.log-drawer.open').forEach(d=>{if(d.id!=='log-'+pid)d.classList.remove('open');});
  drawer.classList.toggle('open');
}


function togLog(id){document.getElementById('log-'+id)?.classList.toggle('open');}

function saveLog(pid,ticker,expiry,type){
  const g=f=>document.getElementById('li-'+pid+'-'+f)?.value||'';
  const t={ticker,expiry,type,strike:g('strike'),entry:g('entry'),qty:g('qty'),tp:g('tp'),sl:g('sl'),note:g('note'),logged_at:new Date().toISOString()};
  const arr=JSON.parse(localStorage.getItem('narratrade-trades')||'[]');
  arr.unshift(t);localStorage.setItem('narratrade-trades',JSON.stringify(arr));
  ['strike','entry','qty','tp','sl','note'].forEach(f=>{const el=document.getElementById('li-'+pid+'-'+f);if(el?.value)el.classList.add('saved');});
  const sv=document.getElementById('ls-'+pid);if(sv){sv.style.display='inline';setTimeout(()=>sv.style.display='none',2500);}
  updateKPIs();
}

async function deepAnalyze(id){
  const s=stories.find(x=>String(x.id)===String(id));if(!s)return;
  const btn=document.getElementById('btn-'+id),spin=document.getElementById('spin-'+id),lbl=document.getElementById('btnlabel-'+id);
  btn.disabled=true;spin.style.display='block';lbl.textContent='Analyzing...';
  try{
    const res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({headline:s.headline,summary:s.summary,impact:s.impact,category:s.category,plays:s.plays})});
    const data=await res.json();if(data.error)throw new Error(data.error);
    document.getElementById('analysis-'+id).innerHTML=`<div class="ai-analysis-box" style="margin-top:12px"><strong style="font-family:var(--font-m);font-size:8px;letter-spacing:1.5px;display:block;margin-bottom:8px;color:var(--accent)">✦ DEEP ANALYSIS</strong>${esc(data.analysis)}</div>`;
  }catch(e){document.getElementById('analysis-'+id).innerHTML=`<div class="ai-analysis-box" style="margin-top:12px;color:var(--red)">Analysis failed: ${esc(e.message)}</div>`;}
  spin.style.display='none';lbl.textContent='✓ Analyzed';btn.disabled=false;
}

function renderTopPlays(){
  const all=[];stories.forEach(s=>(s.plays||[]).forEach(p=>{if(p.conviction>=2)all.push({...p});}));all.sort((a,b)=>b.conviction-a.conviction);
  return; // topPlays merged into signalItems via renderSignalPage
  const el=document.getElementById('topPlays');if(!el)return;
  el.innerHTML=all.slice(0,8).map((p,i)=>{
    const bg=p.direction==='LONG'?'var(--long-bg)':p.direction==='SHORT'?'var(--short-bg)':'var(--comm-bg)';
    const c=p.direction==='LONG'?'var(--long-c)':p.direction==='SHORT'?'var(--short-c)':'var(--comm-c)';
    const b=p.direction==='LONG'?'var(--long-b)':p.direction==='SHORT'?'var(--short-b)':'var(--comm-b)';
    return`<div class="traded-item"><div class="traded-rank">${i+1}</div><div class="traded-ticker">${esc(p.ticker)}</div><div class="traded-name">${esc(p.name||'')}</div><div class="traded-dir" style="background:${bg};color:${c};border:1px solid ${b}">${p.direction}</div></div>`;
  }).join('')||'<div style="color:var(--muted);font-size:10px">No high-conviction plays yet</div>';
}

async function loadSidebar(){loadFG();loadMkt();loadSectors();}

// ── OVERVIEW PANELS (Market Pulse + Sector in Overview tab) ──

async function loadFG(){
  try{
    const r=await fetch('https://production.dataviz.cnn.io/index/fearandgreed/graphdata');
    const d=await r.json();
    const score=Math.round(d?.fear_and_greed?.score??50),rating=d?.fear_and_greed?.rating??'Neutral';
    const vEl=document.getElementById('fgVal'),lEl=document.getElementById('fgLbl');
    if(vEl)vEl.textContent=score;
    if(lEl){lEl.textContent=rating.toUpperCase();lEl.style.color=score<30?'var(--red)':score>70?'var(--accent)':'var(--neut-text)';}
    document.getElementById('kpiSentiment').textContent=score+' · '+rating;
    const gf=document.getElementById('gfill'),gn=document.getElementById('gneedle'),gd=document.getElementById('gdot');
    if(gf)gf.setAttribute('stroke-dashoffset',157-(score/100)*157);
    if(gn&&gd){
      const angle=200+(score/100)*140,rad=(angle*Math.PI)/180;
      gn.setAttribute('x2',65+42*Math.cos(rad));gn.setAttribute('y2',65+42*Math.sin(rad));
      const nc=score<30?'#ff4d6d':score>70?'#00e5a0':'#f5c842';
      gn.setAttribute('stroke',nc);gd.setAttribute('fill',nc);
    }
  }catch{const v=document.getElementById('fgVal');if(v)v.textContent='—';}
}

async function loadMkt(){
  const idx=[{sym:'SPY',label:'S&P 500'},{sym:'QQQ',label:'Nasdaq 100'},{sym:'IWM',label:'Russell 2K'},{sym:'GLD',label:'Gold'},{sym:'TLT',label:'20Y Treasury'},{sym:'USO',label:'Crude Oil'},{sym:'UUP',label:'US Dollar'},{sym:'BTC-USD',label:'Bitcoin'}];
  const mp=document.getElementById('mktPulse');if(!mp)return;
  mp.innerHTML=idx.map(i=>`<div class="pulse-row"><div class="pulse-name">${i.label}</div><div style="text-align:right"><div class="pulse-price" id="pv-${i.sym}">—</div><div class="pulse-chg" id="pc-${i.sym}">—</div></div></div>`).join('');
  // Watchlist too
  const wl=['NVDA','TSLA','SPY','AAPL','BTC-USD'];
  for(const sym of [...new Set([...idx.map(i=>i.sym),...wl])]){
    try{
      const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1m&range=1d`);
      const meta=(await r.json())?.chart?.result?.[0]?.meta;if(!meta)continue;
      const price=meta.regularMarketPrice,prev=meta.chartPreviousClose,chg=prev?(price-prev)/prev*100:0;
      const fmt=sym==='BTC-USD'?'$'+price.toLocaleString('en-US',{maximumFractionDigits:0}):'$'+price.toFixed(2);
      const pv=document.getElementById('pv-'+sym),pc=document.getElementById('pc-'+sym);
      if(pv)pv.textContent=fmt;
      if(pc){pc.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';pc.className='pulse-chg '+(chg>=0?'up':'down');}

    }catch{}
  }
}

async function loadWatchlist(){loadMkt();}

async function loadSectors(){
  const sec=[{sym:'XLK',label:'Technology'},{sym:'XLF',label:'Financials'},{sym:'XLE',label:'Energy'},{sym:'XLV',label:'Healthcare'},{sym:'XLI',label:'Industrials'},{sym:'XLP',label:'Cons. Staples'},{sym:'XLY',label:'Cons. Disc.'},{sym:'XLRE',label:'Real Estate'}];
  const results=[];
  for(const s of sec){
    try{
      const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${s.sym}?interval=1m&range=1d`);
      const meta=(await r.json())?.chart?.result?.[0]?.meta;
      const chg=meta?.chartPreviousClose?(meta.regularMarketPrice-meta.chartPreviousClose)/meta.chartPreviousClose*100:0;
      results.push({label:s.label,chg});
    }catch{results.push({label:s.label,chg:0});}
  }
  const mx=Math.max(...results.map(r=>Math.abs(r.chg)),0.01);
  const sh=document.getElementById('sectorSignal') || document.getElementById('sectorHeat');
  if(sh)sh.innerHTML=results.map(r=>{const c=r.chg>=0?'var(--bull)':'var(--bear)';return`<div class="sector-row"><div class="sector-name">${r.label}</div><div class="sector-bar-wrap"><div class="sector-bar-fill" style="width:${Math.abs(r.chg)/mx*100}%;background:${c}"></div></div><div class="sector-pct" style="color:${c}">${r.chg>=0?'+':''}${r.chg.toFixed(2)}%</div></div>`;}).join('');
}

function startCountdown(){clearInterval(refreshTimer);countdown=300;refreshTimer=setInterval(()=>{countdown--;const rf=document.getElementById('refreshFill');if(rf)rf.style.width=(countdown/300*100)+'%';if(countdown<=0)loadFeed();},1000);}
function setPill(state,label){const el=document.getElementById('livePill');if(el)el.className='live-pill';const lbl=document.getElementById('pillLabel');if(lbl)lbl.textContent=label;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>

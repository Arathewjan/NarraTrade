<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NarraTrade</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c14;--surface:#0d1420;--surface2:#111927;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --text:#e8edf5;--muted:#6b7a96;--muted2:#3d4d66;
  --accent:#00e5a0;--accent2:#0095ff;--accent3:#7b5ea7;--red:#ff4d6d;--gold:#f5c842;
  --bull:#00e5a0;--bull-text:#00e5a0;--bull-light:rgba(0,229,160,0.08);--bull-mid:rgba(0,229,160,0.25);
  --bear:#ff4d6d;--bear-text:#ff4d6d;--bear-light:rgba(255,77,109,0.08);--bear-mid:rgba(255,77,109,0.25);
  --neut:#f5c842;--neut-text:#f5c842;--neut-light:rgba(245,200,66,0.08);--neut-mid:rgba(245,200,66,0.25);
  --long-c:#4a9eff;--long-bg:rgba(74,158,255,0.08);--long-b:rgba(74,158,255,0.22);
  --short-c:#f05252;--short-bg:rgba(240,82,82,0.08);--short-b:rgba(240,82,82,0.22);
  --comm-c:#f5c842;--comm-bg:rgba(245,200,66,0.08);--comm-b:rgba(245,200,66,0.22);
  --options-c:#b06aff;--options-bg:rgba(176,106,255,0.08);--options-b:rgba(176,106,255,0.25);
  --day-c:#f5a623;--day-bg:rgba(245,166,35,0.08);--day-b:rgba(245,166,35,0.25);
  --swing-c:#4a9eff;--swing-bg:rgba(74,158,255,0.08);--swing-b:rgba(74,158,255,0.25);
  --macro-c:#00e5a0;--macro-bg:rgba(0,229,160,0.08);--macro-b:rgba(0,229,160,0.22);
  --investor-c:#c8a96e;--investor-bg:rgba(200,169,110,0.08);--investor-b:rgba(200,169,110,0.22);
  --font-d:'Syne',sans-serif;--font-m:'DM Mono',monospace;--font-s:'Instrument Serif',serif;
}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-d);font-size:13px;-webkit-font-smoothing:antialiased}

/* ── APP NAV ── */
.app-nav{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:62px;background:rgba(8,12,20,0.97);border-bottom:1px solid var(--border)}
.nav-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;cursor:pointer}
.nav-logo span{color:var(--accent)}
.app-right{display:flex;gap:10px;align-items:center}
.app-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer}
.app-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px}
.user-label{font-family:var(--font-m);font-size:9px;color:var(--muted)}
.live-pill{display:flex;align-items:center;gap:6px;font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;color:var(--bull-text);cursor:pointer;padding:5px 13px;border-radius:20px;border:1.5px solid var(--bull-mid);background:var(--bull-light);transition:all 0.2s}
.live-pill:hover{background:rgba(0,229,160,0.12)}
.live-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.header-clock{font-family:var(--font-m);font-size:11px;color:var(--muted)}
.nav-journal-link{font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;color:var(--muted);text-decoration:none;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);transition:all .15s}
.nav-journal-link:hover{color:var(--accent);border-color:rgba(0,229,160,0.3)}

/* DASHBOARD LAYOUT */
.dash-layout{display:grid;grid-template-columns:216px 1fr;min-height:calc(100vh - 64px)}

/* SIDEBAR */
.dash-sidebar{background:var(--surface);border-right:1px solid var(--border);padding:22px 14px;display:flex;flex-direction:column;gap:2px;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
.pages-wrapper{min-width:0}
.sidebar-section{margin-bottom:22px}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);font-family:var(--font-m);padding:0 10px;margin-bottom:6px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all 0.15s;color:var(--muted);font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;font-family:var(--font-d)}
.sidebar-item svg{width:15px;height:15px;flex-shrink:0}
.sidebar-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-item.active{background:rgba(0,229,160,0.1);color:var(--accent)}
.sidebar-item .sbadge{margin-left:auto;background:var(--accent);color:#000;font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px}
.persona-bar-side{padding:10px 12px;margin-top:4px}
.persona-bar-label{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);font-family:var(--font-m);margin-bottom:8px}
.active-persona-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid;margin-bottom:4px}
.active-persona-pill.day{color:var(--day-c);background:var(--day-bg);border-color:var(--day-b)}
.active-persona-pill.swing{color:var(--swing-c);background:var(--swing-bg);border-color:var(--swing-b)}
.active-persona-pill.macro{color:var(--macro-c);background:var(--macro-bg);border-color:var(--macro-b)}
.active-persona-pill.investor{color:var(--investor-c);background:var(--investor-bg);border-color:var(--investor-b)}
.persona-pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.persona-bar-edit{font-family:var(--font-m);font-size:8px;letter-spacing:1px;color:var(--muted);background:none;border:1px solid var(--border2);padding:4px 10px;border-radius:20px;cursor:pointer;margin-top:6px;transition:all 0.2s;display:block}
.persona-bar-edit:hover{border-color:rgba(0,229,160,0.3);color:var(--accent)}
.sidebar-watchlist{margin-top:auto}
.watch-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;cursor:pointer;transition:all 0.15s}
.watch-item:hover{background:var(--surface2)}
.watch-sym{font-size:12px;font-weight:700;font-family:var(--font-m)}
.watch-price{font-size:10px;font-family:var(--font-m);color:var(--muted)}
.watch-chg{font-size:11px;font-family:var(--font-m);font-weight:600}
.watch-chg.up{color:var(--bull)}.watch-chg.dn{color:var(--red)}

/* PAGES */
.dash-page{display:none}
.dash-page.active{display:block}

/* ── OVERVIEW PAGE ── */
.overview-main{padding:26px 30px}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.page-title{font-size:21px;font-weight:800;letter-spacing:-0.5px}
.page-sub{font-size:11px;color:var(--muted);font-family:var(--font-m);margin-top:2px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px;position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;top:0;right:0;width:55px;height:55px;border-radius:0 13px 0 55px;opacity:0.08}
.kpi-card.green::after{background:var(--accent)}.kpi-card.blue::after{background:var(--accent2)}
.kpi-card.purple::after{background:var(--accent3)}.kpi-card.gold::after{background:var(--gold)}
.kpi-label{font-size:10px;color:var(--muted);font-family:var(--font-m);margin-bottom:9px;letter-spacing:0.5px}
.kpi-val{font-size:24px;font-weight:800;letter-spacing:-1px;margin-bottom:5px}
.kpi-sub{font-size:10px;font-family:var(--font-m)}
.kpi-sub.up{color:var(--accent)}.kpi-sub.neu{color:var(--muted)}

/* ── NEWS FEED PAGE ── */
.feed-page{padding:0}
.feed-bars{background:var(--bg)}
.persona-bar-top{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;height:46px;gap:10px}
.persona-bar-label-top{font-family:var(--font-m);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-right:6px}
.filter-bar{background:var(--bg);padding:0 32px;display:flex;align-items:center;height:42px;gap:2px;overflow-x:auto;border-bottom:1px solid var(--border)}
.filter-btn{font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:0 12px;height:26px;border:1px solid transparent;background:none;color:var(--muted);cursor:pointer;border-radius:13px;transition:all 0.15s;white-space:nowrap}
.filter-btn:hover{color:var(--text);background:var(--surface);border-color:var(--border2)}
.filter-btn.active{color:var(--accent);background:rgba(0,229,160,0.07);border-color:rgba(0,229,160,0.25);font-weight:600}
.filter-sep{width:1px;height:16px;background:var(--border2);margin:0 2px;flex-shrink:0}
.feed-layout{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 260px)}
.feed{padding:22px 28px;background:var(--bg);border-right:1px solid var(--border)}
.feed-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.feed-label{font-family:var(--font-m);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.feed-label::before{content:'';width:3px;height:10px;background:var(--accent);border-radius:2px}
.story-count{font-family:var(--font-m);font-size:10px;color:var(--muted)}
.last-fetch{font-family:var(--font-m);font-size:9px;color:var(--muted2);margin-right:8px}
#personaNoticeWrap{margin-bottom:16px}
.persona-notice{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:12px;border:1px solid}
.persona-notice.day{background:var(--day-bg);border-color:var(--day-b);color:var(--day-c)}
.persona-notice.swing{background:var(--swing-bg);border-color:var(--swing-b);color:var(--swing-c)}
.persona-notice.macro{background:var(--macro-bg);border-color:var(--macro-b);color:var(--macro-c)}
.persona-notice.investor{background:var(--investor-bg);border-color:var(--investor-b);color:var(--investor-c)}

/* NEWS CARDS */
.news-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;animation:cardIn 0.35s ease both;cursor:pointer}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.news-card.bullish{border-left:4px solid var(--bull)}
.news-card.bearish{border-left:4px solid var(--bear)}
.news-card.mixed{border-left:4px solid var(--neut)}
.news-card:hover{border-color:var(--border3);box-shadow:0 4px 20px rgba(0,0,0,0.35)}
.news-card.expanded{box-shadow:0 6px 32px rgba(0,0,0,0.4)}
.card-collapsed{padding:16px 20px}
.card-collapsed-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:10px}
.card-headline-main{font-size:15px;font-weight:700;line-height:1.35;color:var(--text);flex:1}
.card-sentiment-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.card-sentiment-icon.bull{background:rgba(0,229,160,0.12);color:var(--accent)}
.card-sentiment-icon.bear{background:rgba(255,77,109,0.12);color:var(--red)}
.card-sentiment-icon.neu{background:rgba(245,200,66,0.1);color:var(--gold)}
.card-summary-text{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:10px;font-family:var(--font-m)}
.card-collapsed-footer{display:flex;align-items:center;gap:8px}
.card-impact-pill{font-family:var(--font-m);font-size:9px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:0.5px}
.pill-bull{background:rgba(0,229,160,0.1);color:var(--accent);border:1px solid rgba(0,229,160,0.25)}
.pill-bear{background:rgba(255,77,109,0.1);color:var(--red);border:1px solid rgba(255,77,109,0.25)}
.pill-neu{background:rgba(245,200,66,0.08);color:var(--gold);border:1px solid rgba(245,200,66,0.2)}
.card-ticker-tag{font-family:var(--font-m);font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--text)}
.card-meta-right{font-family:var(--font-m);font-size:10px;color:var(--muted2);margin-left:auto}

/* expanded panel */
.card-expanded{display:none;border-top:1px solid var(--border);background:rgba(0,0,0,0.18)}
.news-card.expanded .card-expanded{display:block}
.expanded-inner{padding:16px 20px}
.expanded-section-label{font-family:var(--font-m);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.expanded-section-label::before{content:'';width:2px;height:10px;background:var(--accent);border-radius:2px}
.trade-row{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border-radius:10px;margin-bottom:8px;border:1px solid transparent}
.trade-row.long-r{background:var(--long-bg);border-color:var(--long-b)}
.trade-row.short-r{background:var(--short-bg);border-color:var(--short-b)}
.trade-row.comm-r{background:var(--comm-bg);border-color:var(--comm-b)}
.tr-dir{font-family:var(--font-m);font-size:8px;letter-spacing:1.5px;font-weight:700;padding:3px 9px;border-radius:6px;flex-shrink:0;margin-top:2px}
.tr-dir.long{background:var(--long-bg);color:var(--long-c);border:1px solid var(--long-b)}
.tr-dir.short{background:var(--short-bg);color:var(--short-c);border:1px solid var(--short-b)}
.tr-dir.comm{background:var(--comm-bg);color:var(--comm-c);border:1px solid var(--comm-b)}
.tr-body{flex:1}
.tr-ticker{font-size:14px;font-weight:800;color:var(--text);margin-bottom:3px}
.tr-ticker span{font-size:10px;color:var(--muted);font-weight:400;margin-left:6px}
.tr-rationale{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:5px}
.tr-rating{display:flex;align-items:center;gap:6px;font-family:var(--font-m);font-size:8px;color:var(--muted)}
.tr-dots{display:flex;gap:3px}
.tr-dot{width:7px;height:7px;border-radius:50%;background:var(--border2)}
.tr-dot.on{background:var(--accent)}

/* ── OPTIONS DROPDOWN ── */
.options-trigger{display:flex;align-items:center;gap:10px;margin-top:9px;padding:9px 14px;border-radius:9px;background:var(--options-bg);border:1px solid var(--options-b);font-family:var(--font-m);font-size:10px;cursor:pointer;transition:all 0.2s;user-select:none}
.options-trigger:hover{background:rgba(176,106,255,0.13);border-color:rgba(176,106,255,0.45)}
.options-trigger-label{color:var(--options-c);font-weight:700;letter-spacing:1px;font-size:9px}
.options-trigger-ticker{color:var(--text);font-weight:700}
.options-trigger-arrow{margin-left:auto;color:var(--options-c);font-size:11px;transition:transform 0.2s}
.options-trigger.open .options-trigger-arrow{transform:rotate(180deg)}
.options-trigger-status{font-size:8px;color:var(--muted);margin-left:4px}

/* options dropdown panel */
.options-dropdown{display:none;margin-top:4px;border-radius:11px;background:linear-gradient(135deg,rgba(176,106,255,0.07),rgba(0,149,255,0.04));border:1px solid rgba(176,106,255,0.2);overflow:hidden;animation:dropIn 0.2s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.options-dropdown.open{display:block}

.options-loading{display:flex;align-items:center;gap:10px;padding:14px 16px;font-family:var(--font-m);font-size:10px;color:var(--muted)}
.opt-spin{width:12px;height:12px;border:1.5px solid var(--border2);border-top-color:var(--options-c);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.options-closed-msg{padding:14px 16px;font-family:var(--font-m);font-size:10px;color:var(--muted);display:flex;align-items:center;gap:8px}
.options-closed-icon{font-size:14px}

.options-data{padding:14px 16px}
.opt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(176,106,255,0.15)}
.opt-contract-label{font-family:var(--font-m);font-size:11px;font-weight:700;color:var(--options-c)}
.opt-type-pill{font-family:var(--font-m);font-size:8px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:1px}
.opt-type-pill.call{background:rgba(0,229,160,0.1);color:var(--bull-text);border:1px solid rgba(0,229,160,0.25)}
.opt-type-pill.put{background:rgba(255,77,109,0.1);color:var(--bear-text);border:1px solid rgba(255,77,109,0.25)}

.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.opt-row-full{grid-column:1/-1}
.opt-field{background:rgba(0,0,0,0.25);border-radius:8px;padding:9px 12px;border:1px solid var(--border)}
.opt-field-label{font-family:var(--font-m);font-size:7px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.opt-field-val{font-family:var(--font-m);font-size:14px;font-weight:700;color:var(--text)}
.opt-field-val.entry{color:var(--gold)}
.opt-field-val.tp1{color:var(--accent)}
.opt-field-val.tp2{color:var(--accent);opacity:0.75}
.opt-field-val.sl{color:var(--red)}
.opt-field-sub{font-family:var(--font-m);font-size:8px;color:var(--muted);margin-top:2px}

.opt-conviction-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;background:rgba(0,0,0,0.2);border:1px solid var(--border);margin-bottom:10px}
.opt-conviction-label{font-family:var(--font-m);font-size:8px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.opt-conviction-bar{flex:1;height:4px;border-radius:2px;background:var(--border2);overflow:hidden}
.opt-conviction-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--options-c),var(--accent2));transition:width 0.6s ease}
.opt-conviction-score{font-family:var(--font-m);font-size:12px;font-weight:700;color:var(--options-c);min-width:28px;text-align:right}

.opt-meta-row{display:flex;align-items:center;gap:12px;font-family:var(--font-m);font-size:9px;color:var(--muted)}
.opt-meta-item{display:flex;align-items:center;gap:4px}
.opt-meta-dot{width:4px;height:4px;border-radius:50%;background:var(--muted2)}

.opt-log-btn{width:100%;margin-top:10px;font-family:var(--font-m);font-size:8px;letter-spacing:1.5px;padding:7px 16px;border-radius:20px;border:none;cursor:pointer;background:var(--accent);color:#000;font-weight:700;transition:all 0.2s}
.opt-log-btn:hover{box-shadow:0 0 14px rgba(0,229,160,0.3)}

/* log drawer (reused) */
.log-drawer{margin-top:6px;padding:12px 14px;border-radius:9px;background:rgba(0,0,0,0.3);border:1px solid var(--border2);display:none;animation:fadeDown 0.2s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.log-drawer.open{display:block}
.log-drawer-title{font-family:var(--font-m);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.log-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.log-field{display:flex;flex-direction:column;gap:4px}
.log-lbl{font-family:var(--font-m);font-size:7px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.log-input{background:var(--surface);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;color:var(--text);font-family:var(--font-m);font-size:11px;outline:none;transition:all 0.2s;width:100%}
.log-input:focus{border-color:var(--options-c)}
.log-input::placeholder{color:var(--muted2)}

<script>
const SB_URL='https://bjbvtwqckknngaamuaam.supabase.co';
const SB_KEY='sb_publishable_f_j6gPsZNgBqVFWAt6wKRg_pgJkQx7P';
const sb=supabase.createClient(SB_URL,SB_KEY);
const PC={day:['geopolitical','macro','general','forex'],swing:['earnings','crypto','merger','commodities'],macro:['geopolitical','macro','general','forex'],investor:['earnings','general','merger']};
const PM={day:{name:'Day Trader',cls:'day'},swing:{name:'Swing Trader',cls:'swing'},macro:{name:'Macro Trader',cls:'macro'},investor:{name:'Investor',cls:'investor'}};
let stories=[],filter='all',personas=[],user=null;
const seenStoryIds=new Set();

// clock
setInterval(function(){var el=document.getElementById('clock');if(el)el.textContent=new Date().toLocaleTimeString('en-US',{hour12:false});},1000);

// auth
(async function(){
  var res=await sb.auth.getSession();
  var session=res.data.session;
  if(!session){window.location.href='onboarding.html';return;}
  user=session.user;
  var name=user.user_metadata&&user.user_metadata.full_name?user.user_metadata.full_name:user.email.split('@')[0];
  var av=document.getElementById('userAvatar');if(av)av.textContent=name.charAt(0).toUpperCase();
  var pr=await sb.from('profiles').select('personas').eq('id',user.id).single();
  if(pr.data&&pr.data.personas&&pr.data.personas.length){personas=pr.data.personas;localStorage.setItem('narratrade-personas',JSON.stringify(personas));}
  else{var sv=localStorage.getItem('narratrade-personas');personas=sv?JSON.parse(sv):[];}
  if(!personas.length){window.location.href='onboarding.html';return;}
  renderPersonaPills();loadFeed();setInterval(loadSidebar,120000);
})();

function showPage(id){document.querySelectorAll('.dash-page').forEach(function(p){p.classList.remove('active');});var pg=document.getElementById('page-'+id);if(pg)pg.classList.add('active');document.querySelectorAll('.sidebar-item').forEach(function(s){s.classList.remove('active');});var si=document.getElementById('si-'+id);if(si)si.classList.add('active');}
function setFilter(f,btn){filter=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});if(btn)btn.classList.add('active');renderFeed();}
function renderPersonaPills(){var h=personas.map(function(p){var m=PM[p];if(!m)return'';return'<div class="active-persona-pill '+m.cls+'"><div class="persona-pill-dot"></div>'+m.name+'</div>';}).join('');var el=document.getElementById('personaPills');if(el)el.innerHTML=h;renderNotice();}
function renderNotice(){var wrap=document.getElementById('personaNoticeWrap');if(!wrap||!personas.length)return;var cls=personas[0];var m=PM[cls];wrap.innerHTML='<div class="persona-notice '+cls+'">Filtered for '+(m?m.name:'')+' persona.</div>';}
function matches(s){if(!personas.length)return true;return personas.some(function(p){return(PC[p]||[]).includes(s.category)||(PC[p]||[]).includes(s._cat);});}
function setPill(label){var el=document.getElementById('pillLabel');if(el)el.textContent=label;}
function fc(h){var el=document.getElementById('feedContainer');if(el)el.innerHTML=h;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function loadFeed(){
  setPill('FETCHING...');
  fc('<div class="feed-loading"><div class="big-spin"></div><p>PULLING LIVE WIRE...</p><small>Finnhub Reuters MarketWatch</small></div>');
  var raw;
  try{
    var nr=await fetch('/api/news?t='+Date.now());
    if(!nr.ok)throw new Error('News API '+nr.status);
    raw=await nr.json();
    if(!raw||!raw.length)throw new Error('No stories returned');
    raw=raw.filter(function(item){return!seenStoryIds.has(item.id);});
    raw.forEach(function(item){seenStoryIds.add(item.id);});
    if(!raw.length){setPill('REFRESH');setTimeout(loadFeed,900000);return;}
  }catch(e){
    fc('<div class="feed-loading" style="color:var(--red)"><p>FEED ERROR: '+esc(e.message)+'</p><button onclick="loadFeed()" style="margin-top:16px;font-family:var(--font-m);font-size:10px;background:none;border:1px solid var(--red);color:var(--red);padding:8px 20px;cursor:pointer;border-radius:20px">RETRY</button></div>');
    setPill('RETRY');return;
  }
  stories=raw.map(function(item,i){return{id:item.id||i,headline:item.headline,summary:item.summary||'',source:item.source||'Finnhub',url:item.url||'',datetime:item.datetime,_cat:item._cat,impact:'mixed',category:item._cat||'general',plays:[]};});
  renderFeed();renderNotice();setPill('ANALYZING...');
  try{
    var brRes=await Promise.race([
      fetch('/api/briefs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({newsItems:raw})}),
      new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'));},22000);})
    ]);
    if(brRes.ok){
      var briefs=await brRes.json();
      stories=raw.map(function(item,i){
        var ai=briefs&&briefs.find?briefs.find(function(b){return b.i===i;})||{}:{};
        return{id:item.id||i,headline:item.headline,summary:item.summary||'',source:item.source||'Finnhub',url:item.url||'',datetime:item.datetime,_cat:item._cat,impact:ai.impact||'mixed',category:ai.category||item._cat||'general',oneLiner:ai.oneLiner||'',plays:ai.plays||[]};
      });
      renderFeed();renderSignals();
    }
  }catch(e){console.warn('Briefs:',e.message);}
  var lf=document.getElementById('lastFetch');if(lf)lf.textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  var sc=document.getElementById('storyCount');if(sc)sc.textContent=stories.length+' stories';
  setPill('REFRESH');loadSidebar();setTimeout(loadFeed,900000);
}

function renderFeed(){
  var list=filter==='all'?stories:(filter==='bearish'||filter==='bullish'||filter==='mixed')?stories.filter(function(s){return s.impact===filter;}):stories.filter(function(s){return s.category===filter||s._cat===filter;});
  var vis=list.filter(function(s){return matches(s);});
  var hid=list.filter(function(s){return !matches(s);});
  var sc=document.getElementById('storyCount');if(sc)sc.textContent=vis.length+' stories';
  if(!vis.length&&!hid.length){fc('<div class="feed-loading"><p>NO STORIES</p></div>');return;}
  var h=vis.map(function(s,i){return card(s,i);}).join('');
  if(hid.length){h+='<div style="font-family:var(--font-m);font-size:8px;color:var(--muted);margin:20px 0 12px;text-align:center">'+hid.length+' STORIES HIDDEN BY PERSONA</div>';}
  fc(h);
}

function toggleCard(id){var el=document.getElementById('nc-'+id);if(el)el.classList.toggle('expanded');}

// ── OPTIONS FETCH & RENDER ────────────────────────────────────────────────────
// wrapper called from data-attr onclick — reads data attributes, no inline escaping needed
function handleOptionsTrigger(event, el){
  var pid=el.dataset.pid;
  var ticker=el.dataset.ticker;
  var optionDirection=el.dataset.dir;
  var targetExpiry=el.dataset.expiry;
  var conviction=parseInt(el.dataset.conviction)||5;
  toggleOptions(event,pid,ticker,optionDirection,targetExpiry,conviction);
}

async function toggleOptions(event, pid, ticker, optionDirection, targetExpiry, conviction){
  event.stopPropagation();
  var trigger=document.getElementById('opt-trigger-'+pid);
  var dropdown=document.getElementById('opt-drop-'+pid);
  if(!trigger||!dropdown)return;

  var isOpen=dropdown.classList.contains('open');
  // close all other dropdowns first
  document.querySelectorAll('.options-dropdown.open').forEach(function(d){d.classList.remove('open');});
  document.querySelectorAll('.options-trigger.open').forEach(function(t){t.classList.remove('open');});

  if(isOpen){return;} // was open, now closed — done

  trigger.classList.add('open');
  dropdown.classList.add('open');

  // if already loaded, don't refetch
  if(dropdown.dataset.loaded==='1')return;

  // show loading state
  dropdown.innerHTML='<div class="options-loading"><div class="opt-spin"></div>Fetching live contract from Tradier...</div>';

  try{
    var res=await fetch('/api/options',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ticker:ticker,optionDirection:optionDirection,targetExpiry:targetExpiry,conviction:conviction})
    });
    var data=await res.json();

    if(data.marketStatus==='closed'||data.marketStatus==='error'){
      dropdown.innerHTML='<div class="options-closed-msg"><span class="options-closed-icon">🔴</span>'
        +(data.marketStatus==='closed'
          ?'Markets closed — options data available during trading hours (Mon–Fri 9:30am–4pm ET)'
          :'Could not load options data: '+esc(data.error||'Unknown error'))
        +'</div>';
      dropdown.dataset.loaded='1';return;
    }

    var typePill='<span class="opt-type-pill '+data.optionType+'">'+data.optionType.toUpperCase()+'</span>';
    var convPct=Math.round((data.conviction/10)*100);
    var ivStr=data.iv!==null?data.iv+'% IV':'—';
    var oiStr=data.openInterest?data.openInterest.toLocaleString()+' OI':'—';

    dropdown.innerHTML=
      '<div class="options-data">'
        +'<div class="opt-header">'
          +'<div class="opt-contract-label">'+esc(data.contract)+'</div>'
          +typePill
        +'</div>'
        +'<div class="opt-grid">'
          +'<div class="opt-field"><div class="opt-field-label">Ticker</div><div class="opt-field-val">'+esc(data.ticker)+'</div></div>'
          +'<div class="opt-field"><div class="opt-field-label">Entry</div><div class="opt-field-val entry">$'+data.entry+'</div><div class="opt-field-sub">Ask price</div></div>'
          +'<div class="opt-field"><div class="opt-field-label">Take Profit 1</div><div class="opt-field-val tp1">$'+data.tp1+'</div><div class="opt-field-sub">+20%</div></div>'
          +'<div class="opt-field"><div class="opt-field-label">Take Profit 2</div><div class="opt-field-val tp2">$'+data.tp2+'</div><div class="opt-field-sub">+40%</div></div>'
          +'<div class="opt-field opt-row-full"><div class="opt-field-label">Stop Loss</div><div class="opt-field-val sl">$'+data.sl+'</div><div class="opt-field-sub">−30% from entry</div></div>'
        +'</div>'
        +'<div class="opt-conviction-row">'
          +'<div class="opt-conviction-label">Conviction</div>'
          +'<div class="opt-conviction-bar"><div class="opt-conviction-fill" style="width:'+convPct+'%"></div></div>'
          +'<div class="opt-conviction-score">'+data.conviction+'/10</div>'
        +'</div>'
        +'<div class="opt-meta-row">'
          +'<div class="opt-meta-item"><div class="opt-meta-dot"></div>'+esc(ivStr)+'</div>'
          +'<div class="opt-meta-item"><div class="opt-meta-dot"></div>'+esc(oiStr)+'</div>'
          +'<div class="opt-meta-item"><div class="opt-meta-dot"></div>Exp '+esc(data.expiry)+'</div>'
        +'</div>'
        +'<button class="opt-log-btn" data-pid="'+pid+'" data-ticker="'+esc(ticker)+'" data-expiry="'+esc(data.expiry)+'" data-type="'+data.optionType.toUpperCase()+'" data-entry="'+data.entry+'" data-tp1="'+data.tp1+'" data-tp2="'+data.tp2+'" data-sl="'+data.sl+'" onclick="event.stopPropagation();handleLogBtn(this)">LOG THIS TRADE</button>'
      +'</div>';
    dropdown.dataset.loaded='1';
  }catch(e){
    dropdown.innerHTML='<div class="options-closed-msg"><span class="options-closed-icon">⚠</span>Options fetch failed: '+esc(e.message)+'</div>';
  }
}

function card(s,i){
  var imp=s.impact||'mixed';
  var sc={bullish:'bull',bearish:'bear',mixed:'neu'}[imp]||'neu';
  var si={bullish:'^',bearish:'v',mixed:'-'}[imp]||'-';
  var pc={bullish:'pill-bull',bearish:'pill-bear',mixed:'pill-neu'}[imp]||'pill-neu';
  var pl={bullish:'BULLISH',bearish:'BEARISH',mixed:'MIXED'}[imp]||'MIXED';
  var clean=(s.summary||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().slice(0,180);
  var ageMin=s.datetime?Math.round((Date.now()/1000-s.datetime)/60):null;
  var age=ageMin===null?'':(ageMin<60?ageMin+'m ago':Math.floor(ageMin/60)+'h ago');
  var tickers=(s.plays||[]).map(function(p){return p.ticker;}).filter(Boolean).slice(0,3).map(function(t){return '<span class="card-ticker-tag">'+esc(t)+'</span>';}).join('');

  var tradeRows=(s.plays||[]).map(function(p){
    var rc=p.direction==='LONG'?'long-r':p.direction==='SHORT'?'short-r':'comm-r';
    var dc=p.direction==='LONG'?'long':p.direction==='SHORT'?'short':'comm';
    var pid='p'+String(s.id).replace(/[^a-zA-Z0-9]/g,'')+String(p.ticker).replace(/[^a-zA-Z0-9]/g,'');
    var conviction=p.conviction||5;
    var optDir=p.optionDirection||(p.direction==='SHORT'?'put':'call');
    var targetExpiry=p.targetExpiry||new Date(Date.now()+14*24*60*60*1000).toISOString().split('T')[0];

    // conviction dots (scale 1-10 shown as filled out of 10, display 5 dots scaled)
    var filledDots=Math.round((conviction/10)*5);
    var dots=[1,2,3,4,5].map(function(n){return '<div class="tr-dot'+(n<=filledDots?' on':'')+'"></div>';}).join('');

    return '<div class="trade-row '+rc+'">'
      +'<div class="tr-dir '+dc+'">'+p.direction+'</div>'
      +'<div class="tr-body">'
        +'<div class="tr-ticker">'+esc(p.ticker)+'<span>'+esc(p.name||'')+'</span></div>'
        +'<div class="tr-rationale">'+esc(p.rationale||'')+'</div>'
        +'<div class="tr-rating"><div class="tr-dots">'+dots+'</div>CONVICTION '+conviction+'/10</div>'
      +'</div>'
      +'</div>'
      // options trigger — data attrs avoid inline quote escaping bugs
      +'<div class="options-trigger" id="opt-trigger-'+pid+'" data-pid="'+pid+'" data-ticker="'+p.ticker+'" data-dir="'+optDir+'" data-expiry="'+targetExpiry+'" data-conviction="'+conviction+'" onclick="handleOptionsTrigger(event,this)">'
        +'<span class="options-trigger-label">⬡ OPTIONS</span>'
        +'<span class="options-trigger-ticker">'+esc(p.ticker)+'</span>'
        +'<span class="options-trigger-status">'+optDir.toUpperCase()+' · '+targetExpiry+'</span>'
        +'<span class="options-trigger-arrow">▼</span>'
      +'</div>'
      // options dropdown (empty shell, filled on click)
      +'<div class="options-dropdown" id="opt-drop-'+pid+'"></div>'
      // log drawer
      +'<div class="log-drawer" id="log-'+pid+'" onclick="event.stopPropagation()">'
        +'<div class="log-drawer-title" id="log-title-'+pid+'">LOG TRADE</div>'
        +'<div class="log-row">'
          +'<div class="log-field"><div class="log-lbl">Entry</div><input class="log-input" id="li-'+pid+'-entry" placeholder="$0.00"></div>'
          +'<div class="log-field"><div class="log-lbl">Qty</div><input class="log-input" id="li-'+pid+'-qty" placeholder="5"></div>'
          +'<div class="log-field"><div class="log-lbl">TP1</div><input class="log-input" id="li-'+pid+'-tp" placeholder="$0.00"></div>'
        +'</div>'
        +'<div class="log-row">'
          +'<div class="log-field"><div class="log-lbl">TP2</div><input class="log-input" id="li-'+pid+'-tp2" placeholder="$0.00"></div>'
          +'<div class="log-field"><div class="log-lbl">Stop Loss</div><input class="log-input" id="li-'+pid+'-sl" placeholder="$0.00"></div>'
          +'<div class="log-field"><div class="log-lbl">Notes</div><input class="log-input" id="li-'+pid+'-note" placeholder="Thesis"></div>'
        +'</div>'
        +'<div class="log-actions">'
          +'<button class="log-save-btn" onclick="saveLog(\''+pid+'\',\''+esc(p.ticker)+'\',\''+targetExpiry+'\',\''+optDir.toUpperCase()+'\')">SAVE</button>'
          +'<span class="log-saved" id="ls-'+pid+'">✓ SAVED</span>'
        +'</div>'
      +'</div>';
  }).join('');

  return '<div class="news-card '+imp+'" id="nc-'+s.id+'" onclick="toggleCard(\''+s.id+'\')">'
    +'<div class="card-collapsed">'
      +'<div class="card-collapsed-top"><div class="card-headline-main">'+esc(s.headline)+'</div></div>'
      +'<div class="card-summary-text">'+esc(clean)+'</div>'
      +'<div class="card-collapsed-footer"><span class="card-impact-pill '+pc+'">'+pl+'</span>'+tickers+'<span class="card-meta-right">'+esc(s.source)+(age?' - '+age:'')+'</span></div>'
    +'</div>'
    +'<div class="card-expanded">'
      +'<div class="expanded-inner">'
        +'<div class="expanded-section-label">Trade Plays</div>'
        +(tradeRows||'<div style="color:var(--muted);font-size:11px">No plays for this story.</div>')
        +'<div id="analysis-'+s.id+'"></div>'
      +'</div>'
      +'<div class="expanded-footer">'
        +(s.url?'<a class="story-link" href="'+esc(s.url)+'" target="_blank" onclick="event.stopPropagation()">READ STORY</a>':'<span></span>')
        +'<button class="deep-btn" id="btn-'+s.id+'" onclick="event.stopPropagation();deepAnalyze('+JSON.stringify(String(s.id))+')"><span id="btnlabel-'+s.id+'">Deep Analysis</span></button>'
      +'</div>'
    +'</div>'
  +'</div>';
}

// pre-fill log drawer with live options data
function handleLogBtn(el){
  var pid=el.dataset.pid;
  var ticker=el.dataset.ticker;
  var expiry=el.dataset.expiry;
  var type=el.dataset.type;
  var entry=parseFloat(el.dataset.entry)||0;
  var tp1=parseFloat(el.dataset.tp1)||0;
  var tp2=parseFloat(el.dataset.tp2)||0;
  var sl=parseFloat(el.dataset.sl)||0;
  openLog(pid,ticker,expiry,type,entry,tp1,tp2,sl);
}

function openLog(pid,ticker,expiry,type,entry,tp1,tp2,sl){
  document.querySelectorAll('.log-drawer.open').forEach(function(d){if(d.id!=='log-'+pid)d.classList.remove('open');});
  var d=document.getElementById('log-'+pid);if(!d)return;
  var isOpen=d.classList.contains('open');
  d.classList.toggle('open');
  if(!isOpen){
    // pre-fill with live data
    var set=function(f,v){var el=document.getElementById('li-'+pid+'-'+f);if(el&&v)el.value=v;};
    set('entry',entry?'$'+entry:'');
    set('tp','$'+tp1);
    set('tp2','$'+tp2);
    set('sl','$'+sl);
    var title=document.getElementById('log-title-'+pid);
    if(title)title.textContent=ticker+' '+expiry+' '+type;
  }
}

function saveLog(pid,ticker,expiry,type){
  var g=function(f){var el=document.getElementById('li-'+pid+'-'+f);return el?el.value:'';};
  var t={ticker:ticker,expiry:expiry,type:type,entry:g('entry'),qty:g('qty'),tp1:g('tp'),tp2:g('tp2'),sl:g('sl'),note:g('note'),logged_at:new Date().toISOString()};
  var arr=JSON.parse(localStorage.getItem('narratrade-trades')||'[]');arr.unshift(t);
  localStorage.setItem('narratrade-trades',JSON.stringify(arr));
  var sv=document.getElementById('ls-'+pid);
  if(sv){sv.style.display='inline';setTimeout(function(){sv.style.display='none';},2500);}
}

async function deepAnalyze(id){
  var s=stories.find(function(x){return String(x.id)===String(id);});if(!s)return;
  var lbl=document.getElementById('btnlabel-'+id);if(lbl)lbl.textContent='Analyzing...';
  try{
    var res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({headline:s.headline,summary:s.summary,impact:s.impact,category:s.category,plays:s.plays})});
    var data=await res.json();
    var box=document.getElementById('analysis-'+id);
    if(box)box.innerHTML='<div class="ai-analysis-box" style="margin-top:12px">'+esc(data.analysis||'No analysis')+'</div>';
  }catch(e){console.error(e);}
  if(lbl)lbl.textContent='Deep Analysis';
}

function renderSignals(){
  var topPlays=[];
  stories.forEach(function(s){(s.plays||[]).forEach(function(p){if(p.conviction>=6)topPlays.push({ticker:p.ticker,direction:p.direction,rationale:p.rationale,conviction:p.conviction});});});
  topPlays.sort(function(a,b){return b.conviction-a.conviction;});
  var el=document.getElementById('signalItems');
  if(el)el.innerHTML=topPlays.slice(0,5).map(function(p){
    var isL=p.direction==='LONG'||p.direction==='COMMODITY';
    var pct=Math.round((p.conviction/10)*100)+'%';
    return '<div class="sig-item"><div class="sig-top"><div class="sig-sym">'+esc(p.ticker)+'</div><div class="sig-dir '+(isL?'long':'short')+'">'+p.direction+'</div></div><div class="sig-setup">'+esc((p.rationale||'').slice(0,70))+'</div><div class="sig-conf-row"><div class="sig-bar"><div class="sig-bar-fill '+(isL?'long':'short')+'" style="width:'+pct+'"></div></div><div class="sig-conf-pct '+(isL?'long-c':'short-c')+'">'+pct+'</div></div></div>';
  }).join('')||'<div style="color:var(--muted);font-size:10px">Load feed for signals</div>';
  var bullC=stories.filter(function(s){return s.impact==='bullish';}).length;
  var bearC=stories.filter(function(s){return s.impact==='bearish';}).length;
  var pt=document.getElementById('pulseTxt');
  if(pt)pt.textContent=stories.length+' stories. '+(bullC>=bearC?'Bullish':'Bearish')+' bias: '+bullC+' bull vs '+bearC+' bear.';
}

async function loadSidebar(){loadFG();loadMkt();}
async function loadFG(){try{var r=await fetch('https://production.dataviz.cnn.io/index/fearandgreed/graphdata');var d=await r.json();var score=Math.round(d.fear_and_greed?d.fear_and_greed.score:50);var rating=d.fear_and_greed?d.fear_and_greed.rating:'Neutral';var vEl=document.getElementById('fgVal'),lEl=document.getElementById('fgLbl');if(vEl)vEl.textContent=score;if(lEl){lEl.textContent=rating.toUpperCase();lEl.style.color=score<30?'var(--red)':score>70?'var(--accent)':'var(--gold)';}}catch(e){}}
async function loadMkt(){var syms=['SPY','QQQ','BTC-USD','GLD'];for(var k=0;k<syms.length;k++){try{var r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/'+syms[k]+'?interval=1m&range=1d');var meta=(await r.json()).chart.result[0].meta;var price=meta.regularMarketPrice,prev=meta.chartPreviousClose,chg=prev?(price-prev)/prev*100:0;var pv=document.getElementById('pv-'+syms[k]),pc=document.getElementById('pc-'+syms[k]);if(pv)pv.textContent=(syms[k]==='BTC-USD'?'$'+Math.round(price).toLocaleString():'$'+price.toFixed(2));if(pc){pc.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';pc.className='pulse-chg '+(chg>=0?'up':'down');}}catch(e){}}}
</script>
